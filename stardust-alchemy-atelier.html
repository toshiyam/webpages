<!doctype html>
<!--
name: 星屑錬金アトリエ
version: 0.1
type: single-html-app
status: draft
-->
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>星屑錬金アトリエ</title>
  <style>
    * { box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f3ff;
      color: #231a32;
      padding: 16px;
      padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 1px solid #ded4f2;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(60, 35, 100, 0.08);
      margin-bottom: 16px;
    }
    h1 { margin-top: 0; }
    h2 { font-size: 1.2em; margin: 16px 0 12px; }
    h3 { font-size: 1em; margin: 12px 0 8px; }
    button {
      padding: 12px 16px; font-size: 1em; border: 1px solid #ded4f2;
      border-radius: 8px; background: #fff; cursor: pointer;
      transition: all 0.2s; margin-right: 8px; margin-bottom: 8px; min-height: 44px;
    }
    button:hover { background: #f5f1ff; border-color: #7c3aed; }
    button.primary { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    button.primary:hover { background: #6d28d9; }
    button.danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.success { background: #16a34a; color: #fff; border-color: #16a34a; }
    button.success:hover { background: #15803d; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(140px, 100%), 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .status-item { padding: 12px; background: #f7f3ff; border-radius: 8px; min-width: 0; }
    .status-label {
      font-size: 0.85em; color: #6b6180; margin-bottom: 4px;
      white-space: nowrap; word-break: keep-all; overflow: hidden; text-overflow: ellipsis;
    }
    .status-value { font-size: 1.4em; font-weight: bold; white-space: nowrap; }
    .status-value.wrap { white-space: normal; font-size: 1.1em; line-height: 1.3; }
    .stat-row {
      display: grid; grid-template-columns: minmax(0, auto) minmax(0, 1fr);
      align-items: center; column-gap: 12px; padding: 10px 0;
      border-bottom: 1px solid #f0ebfa; font-size: 0.95em;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-row > span:first-child { white-space: nowrap; word-break: keep-all; color: #6b6180; }
    .stat-row > span:last-child { text-align: right; white-space: nowrap; font-weight: 600; min-width: 0; }
    .item-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(min(260px, 100%), 1fr));
      gap: 12px;
    }
    .item-card {
      border: 2px solid #ded4f2; border-radius: 12px; padding: 12px; min-width: 0;
      background: #fff;
    }
    .item-card.locked { opacity: 0.55; background: #f7f3ff; }
    .item-card.fulfilled { border-color: #16a34a; background: #f0fdf4; }
    .item-title { font-weight: bold; margin-bottom: 6px; }
    .item-need { font-size: 0.85em; color: #6b6180; margin-bottom: 8px; }
    .qty-form {
      display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px;
      align-items: center; margin-top: 8px;
    }
    .qty-input {
      padding: 8px 10px; border: 1px solid #ded4f2; border-radius: 6px;
      width: 100%; min-height: 44px; font-size: 16px;
    }
    .event-log {
      max-height: 400px; overflow-y: auto; background: #f7f3ff;
      border-radius: 8px; padding: 12px; font-size: 0.9em;
    }
    .event-item {
      padding: 8px; border-left: 3px solid #ded4f2; margin-bottom: 8px;
      padding-left: 12px;
    }
    .event-turn { font-weight: bold; margin-bottom: 4px; }
    .event-text { color: #4b4460; }
    .event-bad { border-left-color: #dc2626; }
    .event-good { border-left-color: #7c3aed; }
    .hidden { display: none; }
    @media (max-width: 600px) {
      body { padding: 12px; padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px)); }
      .status-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .item-grid { grid-template-columns: minmax(0, 1fr); }
      .qty-form { grid-template-columns: minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>星屑錬金アトリエ</h1>
      <p>星空の素材を集め、調合し、依頼に納品して評判とレベルを高める小型リソース管理ゲームです。</p>

      <div class="btn-group">
        <button id="btnGather" class="primary">採集する</button>
        <button id="btnHistory">履歴・統計</button>
        <button id="btnReset" class="danger">全データリセット</button>
      </div>
    </section>

    <section class="card">
      <h2>アトリエの状況</h2>
      <div class="status-bar">
        <div class="status-item">
          <div class="status-label">レベル / 称号</div>
          <div class="status-value wrap" id="levelLabel">Lv.1</div>
        </div>
        <div class="status-item">
          <div class="status-label">経験値</div>
          <div class="status-value" id="expLabel">0 / 60</div>
        </div>
        <div class="status-item">
          <div class="status-label">評判</div>
          <div class="status-value" id="reputationLabel">0</div>
        </div>
        <div class="status-item">
          <div class="status-label">光る欠片</div>
          <div class="status-value" id="shardsLabel">0</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>素材</h2>
      <div id="materialsContainer"></div>
    </section>

    <section class="card">
      <h2>調合</h2>
      <div class="item-grid" id="recipesContainer"></div>
    </section>

    <section class="card">
      <h2>作品在庫</h2>
      <div id="worksContainer"></div>
    </section>

    <section class="card">
      <h2>依頼</h2>
      <div class="item-grid" id="requestsContainer"></div>
    </section>

    <section id="historyPanel" class="card hidden">
      <h2>履歴・統計</h2>
      <div class="status-bar" id="statsSummary"></div>
      <div class="event-log" id="eventLog"></div>
      <div class="btn-group" style="margin-top: 12px;">
        <button id="btnCloseHistory">閉じる</button>
      </div>
    </section>
  </main>

  <script>
    'use strict';

    const STORAGE_KEY = 'stardustAlchemyAtelier_v0.1';

    const MATERIALS = [
      { id: 'stardust', name: '星屑' },
      { id: 'moondew', name: '月露' },
      { id: 'amberSand', name: '琥珀砂' },
      { id: 'emptyVial', name: '空小瓶' }
    ];

    const RECIPES = [
      { id: 'lightTonic', name: '光の秘薬', requires: { stardust: 2, emptyVial: 1 }, expGain: 8, requiredLevel: 1 },
      { id: 'moondewCharm', name: '月露のお守り', requires: { moondew: 2, amberSand: 1 }, expGain: 10, requiredLevel: 1 },
      { id: 'stardustCrystal', name: '星屑の結晶', requires: { stardust: 3, moondew: 2, emptyVial: 1 }, expGain: 18, requiredLevel: 2 },
      { id: 'amberLamp', name: '琥珀のランタン', requires: { amberSand: 3, emptyVial: 2, stardust: 1 }, expGain: 22, requiredLevel: 3 }
    ];

    const TITLES = [
      { minLevel: 1, name: '見習い錬金術師' },
      { minLevel: 3, name: '腕利き錬金術師' },
      { minLevel: 5, name: '星読みの匠' },
      { minLevel: 7, name: '伝説の錬金術師' }
    ];

    const ACTIVE_REQUEST_COUNT = 3;

    function recipeById(id) {
      return RECIPES.find(r => r.id === id) || null;
    }

    function expToNext(level) {
      return level * 60;
    }

    function titleForLevel(level) {
      let title = TITLES[0].name;
      for (const t of TITLES) {
        if (level >= t.minLevel) title = t.name;
      }
      return title;
    }

    function freshState() {
      const materials = {};
      MATERIALS.forEach(m => { materials[m.id] = 0; });
      materials.stardust = 2;
      materials.moondew = 1;
      materials.emptyVial = 3;

      const works = {};
      RECIPES.forEach(r => { works[r.id] = 0; });

      return {
        level: 1,
        exp: 0,
        reputation: 0,
        maxReputation: 0,
        shards: 0,
        materials,
        works,
        requests: [],
        history: [],
        stats: { gatherCount: 0, craftCount: 0, deliverCount: 0 },
        nextRequestId: 1
      };
    }

    let state = freshState();

    function isFiniteNumber(v) {
      return typeof v === 'number' && Number.isFinite(v);
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('Save failed:', e);
      }
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const loaded = JSON.parse(saved);
          if (validateState(loaded)) {
            state = loaded;
            return true;
          }
        }
      } catch (e) {
        console.error('Load failed:', e);
      }
      return false;
    }

    function validateState(obj) {
      if (!obj || typeof obj !== 'object') return false;
      if (!isFiniteNumber(obj.level) || obj.level < 1) return false;
      if (!isFiniteNumber(obj.exp) || obj.exp < 0) return false;
      if (!isFiniteNumber(obj.reputation) || obj.reputation < 0) return false;
      if (!isFiniteNumber(obj.maxReputation) || obj.maxReputation < 0) return false;
      if (!isFiniteNumber(obj.shards) || obj.shards < 0) return false;
      if (!isFiniteNumber(obj.nextRequestId)) return false;

      if (!obj.materials || typeof obj.materials !== 'object') return false;
      for (const m of MATERIALS) {
        if (!isFiniteNumber(obj.materials[m.id]) || obj.materials[m.id] < 0) return false;
      }

      if (!obj.works || typeof obj.works !== 'object') return false;
      for (const r of RECIPES) {
        if (!isFiniteNumber(obj.works[r.id]) || obj.works[r.id] < 0) return false;
      }

      if (!Array.isArray(obj.requests)) return false;
      for (const req of obj.requests) {
        if (!req || typeof req !== 'object') return false;
        if (!isFiniteNumber(req.id)) return false;
        if (typeof req.recipeId !== 'string' || !recipeById(req.recipeId)) return false;
        if (!isFiniteNumber(req.requiredQty) || req.requiredQty <= 0) return false;
        if (!isFiniteNumber(req.reward) || req.reward < 0) return false;
        if (!isFiniteNumber(req.reputationGain) || req.reputationGain < 0) return false;
      }

      if (!Array.isArray(obj.history)) return false;
      for (const h of obj.history) {
        if (!h || typeof h !== 'object') return false;
        if (typeof h.text !== 'string' || !isFiniteNumber(h.timestamp)) return false;
      }

      if (!obj.stats || typeof obj.stats !== 'object') return false;
      if (!isFiniteNumber(obj.stats.gatherCount) || obj.stats.gatherCount < 0) return false;
      if (!isFiniteNumber(obj.stats.craftCount) || obj.stats.craftCount < 0) return false;
      if (!isFiniteNumber(obj.stats.deliverCount) || obj.stats.deliverCount < 0) return false;

      return true;
    }

    function addLog(text) {
      state.history.push({ text: text, timestamp: Date.now() });
      if (state.history.length > 60) {
        state.history.shift();
      }
    }

    function generateRequest() {
      const recipe = RECIPES[Math.floor(Math.random() * RECIPES.length)];
      const requiredQty = 1 + Math.floor(Math.random() * 2);
      const reward = Math.round(recipe.expGain * 3) + Math.floor(Math.random() * 10);
      const reputationGain = 3 + Math.floor(Math.random() * 3);
      const request = {
        id: state.nextRequestId++,
        recipeId: recipe.id,
        requiredQty,
        reward,
        reputationGain
      };
      state.requests.push(request);
      return request;
    }

    function ensureRequestPool() {
      while (state.requests.length < ACTIVE_REQUEST_COUNT) {
        generateRequest();
      }
    }

    function gainExp(amount) {
      state.exp += amount;
      let leveledUp = false;
      while (state.exp >= expToNext(state.level)) {
        state.exp -= expToNext(state.level);
        state.level++;
        leveledUp = true;
      }
      if (leveledUp) {
        addLog(`✨ レベルアップ！ Lv.${state.level} (${titleForLevel(state.level)})になりました。`);
      }
    }

    function gather() {
      const pool = MATERIALS.map(m => m.id);
      const numTypes = 1 + Math.floor(Math.random() * 2);
      const gains = {};
      for (let i = 0; i < numTypes && pool.length > 0; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const matId = pool.splice(idx, 1)[0];
        const amount = 1 + Math.floor(Math.random() * 3);
        gains[matId] = (gains[matId] || 0) + amount;
      }

      Object.keys(gains).forEach(matId => {
        state.materials[matId] += gains[matId];
      });

      const gainText = Object.keys(gains).map(matId => {
        const mat = MATERIALS.find(m => m.id === matId);
        return `${mat.name}+${gains[matId]}`;
      }).join(' / ');

      state.stats.gatherCount++;
      addLog(`採集: ${gainText}`);

      if (Math.random() < 0.25) {
        triggerGatherEvent();
      }

      saveState();
      render();
    }

    function triggerGatherEvent() {
      const events = [
        () => {
          state.materials.stardust += 3;
          addLog('🌟 星屑の鉱脈を見つけた！ 星屑+3');
        },
        () => {
          state.materials.moondew += 2;
          state.reputation += 1;
          state.maxReputation = Math.max(state.maxReputation, state.reputation);
          addLog('🌙 月露の泉を見つけた！ 月露+2、評判+1');
        },
        () => {
          state.materials.emptyVial += 2;
          addLog('🍶 空き瓶を見つけた！ 空小瓶+2');
        },
        () => {
          state.materials.amberSand += 2;
          addLog('🟠 琥珀の鉱脈を見つけた！ 琥珀砂+2');
        },
        () => {
          const held = MATERIALS.filter(m => state.materials[m.id] > 0);
          if (held.length === 0) return;
          const target = held[Math.floor(Math.random() * held.length)];
          state.materials[target.id] = Math.max(0, state.materials[target.id] - 1);
          addLog(`⚠️ 採集中につまずいてしまった…${target.name}-1`);
        }
      ];

      events[Math.floor(Math.random() * events.length)]();
    }

    function craftRecipe(recipeId) {
      const recipe = recipeById(recipeId);
      if (!recipe) return;

      if (state.level < recipe.requiredLevel) {
        alert(`このレシピはLv.${recipe.requiredLevel}で解放されます。`);
        return;
      }

      const input = document.getElementById(`qty_${recipeId}`);
      const raw = input ? input.value.trim() : '1';

      if (raw === '') {
        alert('調合する個数を入力してください。');
        return;
      }

      const qty = Number(raw);
      if (!Number.isFinite(qty)) {
        alert('個数が不正な値です。');
        return;
      }
      if (!Number.isInteger(qty)) {
        alert('個数は整数で入力してください。');
        return;
      }
      if (qty <= 0) {
        alert('個数は1以上にしてください。');
        return;
      }

      const shortages = [];
      Object.keys(recipe.requires).forEach(matId => {
        const need = recipe.requires[matId] * qty;
        const have = state.materials[matId] || 0;
        if (have < need) {
          const mat = MATERIALS.find(m => m.id === matId);
          shortages.push(`${mat.name}(必要:${need} / 保有:${have})`);
        }
      });

      if (shortages.length > 0) {
        alert(`素材が不足しています。 ${shortages.join(' / ')}`);
        return;
      }

      Object.keys(recipe.requires).forEach(matId => {
        state.materials[matId] -= recipe.requires[matId] * qty;
      });

      let produced = qty;
      let critical = false;
      if (Math.random() < 0.15) {
        produced += 1;
        critical = true;
      }

      state.works[recipe.id] += produced;
      state.stats.craftCount++;
      gainExp(recipe.expGain * qty);

      if (input) input.value = '1';

      addLog(critical
        ? `✨ 調合成功(会心)！「${recipe.name}」を${produced}個作成しました。`
        : `調合成功: 「${recipe.name}」を${produced}個作成しました。`);

      saveState();
      render();
    }

    function deliverRequest(requestId) {
      const request = state.requests.find(r => r.id === requestId);
      if (!request) return;

      const recipe = recipeById(request.recipeId);
      if (!recipe) return;

      const have = state.works[recipe.id] || 0;
      if (have < request.requiredQty) {
        alert(`「${recipe.name}」が不足しています。(必要: ${request.requiredQty} / 保有: ${have})`);
        return;
      }

      state.works[recipe.id] -= request.requiredQty;
      state.shards += request.reward;
      state.reputation += request.reputationGain;
      state.maxReputation = Math.max(state.maxReputation, state.reputation);
      state.stats.deliverCount++;

      state.requests = state.requests.filter(r => r.id !== requestId);
      ensureRequestPool();

      addLog(`納品完了: 「${recipe.name}」×${request.requiredQty}を届け、光る欠片${request.reward}・評判+${request.reputationGain}を得ました。`);

      saveState();
      render();
    }

    function resetAll() {
      if (!confirm('すべてのデータをリセットしますか？レベル、素材、履歴もすべて失われます。')) return;
      state = freshState();
      ensureRequestPool();
      addLog('アトリエをリセットしました。');
      saveState();
      render();
    }

    function toggleHistory() {
      const panel = document.getElementById('historyPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        renderHistoryPanel();
      }
    }

    function renderHistoryPanel() {
      const summary = document.getElementById('statsSummary');
      const log = document.getElementById('eventLog');

      summary.innerHTML = `
        <div class="status-item">
          <div class="status-label">総採集回数</div>
          <div class="status-value">${state.stats.gatherCount}</div>
        </div>
        <div class="status-item">
          <div class="status-label">総調合数</div>
          <div class="status-value">${state.stats.craftCount}</div>
        </div>
        <div class="status-item">
          <div class="status-label">総納品数</div>
          <div class="status-value">${state.stats.deliverCount}</div>
        </div>
        <div class="status-item">
          <div class="status-label">最高評判</div>
          <div class="status-value">${state.maxReputation}</div>
        </div>
      `;

      const recentLogs = state.history.slice(-15).reverse();
      if (recentLogs.length === 0) {
        log.innerHTML = '<p>履歴がまだありません。</p>';
        return;
      }

      log.innerHTML = recentLogs.map(h => {
        const isBad = h.text.includes('⚠️');
        const isGood = h.text.includes('✨') || h.text.includes('🌟') || h.text.includes('🌙') || h.text.includes('🍶') || h.text.includes('🟠');
        const cls = isBad ? 'event-bad' : isGood ? 'event-good' : '';
        const date = new Date(h.timestamp);
        const dateLabel = isNaN(date.getTime()) ? '' : date.toLocaleTimeString('ja-JP');
        return `
          <div class="event-item ${cls}">
            <div class="event-turn">${dateLabel}</div>
            <div class="event-text">${h.text}</div>
          </div>
        `;
      }).join('');
    }

    function render() {
      document.getElementById('levelLabel').textContent = `Lv.${state.level} ${titleForLevel(state.level)}`;
      document.getElementById('expLabel').textContent = `${state.exp} / ${expToNext(state.level)}`;
      document.getElementById('reputationLabel').textContent = state.reputation;
      document.getElementById('shardsLabel').textContent = state.shards;

      renderMaterials();
      renderRecipes();
      renderWorks();
      renderRequests();

      const historyPanel = document.getElementById('historyPanel');
      if (!historyPanel.classList.contains('hidden')) {
        renderHistoryPanel();
      }
    }

    function renderMaterials() {
      const container = document.getElementById('materialsContainer');
      container.innerHTML = MATERIALS.map(m => `
        <div class="stat-row">
          <span>${m.name}</span>
          <span>${state.materials[m.id]}</span>
        </div>
      `).join('');
    }

    function renderWorks() {
      const container = document.getElementById('worksContainer');
      container.innerHTML = RECIPES.map(r => `
        <div class="stat-row">
          <span>${r.name}</span>
          <span>${state.works[r.id]}</span>
        </div>
      `).join('');
    }

    function renderRecipes() {
      const container = document.getElementById('recipesContainer');
      container.innerHTML = RECIPES.map(r => {
        const locked = state.level < r.requiredLevel;
        const needText = Object.keys(r.requires).map(matId => {
          const mat = MATERIALS.find(m => m.id === matId);
          return `${mat.name}×${r.requires[matId]}`;
        }).join(' / ');

        if (locked) {
          return `
            <div class="item-card locked">
              <div class="item-title">${r.name}</div>
              <div class="item-need">必要素材: ${needText}</div>
              <div class="item-need">Lv.${r.requiredLevel}で解放</div>
            </div>
          `;
        }

        return `
          <div class="item-card">
            <div class="item-title">${r.name}</div>
            <div class="item-need">必要素材: ${needText} (経験値+${r.expGain})</div>
            <div class="qty-form">
              <input type="number" id="qty_${r.id}" class="qty-input" value="1" min="1" step="1">
              <button class="primary" onclick="craftRecipe('${r.id}')">調合する</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderRequests() {
      const container = document.getElementById('requestsContainer');
      if (state.requests.length === 0) {
        container.innerHTML = '<p>現在依頼はありません。</p>';
        return;
      }

      container.innerHTML = state.requests.map(req => {
        const recipe = recipeById(req.recipeId);
        if (!recipe) return '';
        const have = state.works[recipe.id] || 0;
        const canDeliver = have >= req.requiredQty;
        return `
          <div class="item-card">
            <div class="item-title">「${recipe.name}」×${req.requiredQty}</div>
            <div class="item-need">報酬: 光る欠片${req.reward} / 評判+${req.reputationGain}</div>
            <div class="item-need">保有: ${have} / 必要: ${req.requiredQty}</div>
            <button class="success" ${canDeliver ? '' : 'disabled'} onclick="deliverRequest(${req.id})">納品する</button>
          </div>
        `;
      }).join('');
    }

    // Event listeners
    document.getElementById('btnGather').addEventListener('click', gather);
    document.getElementById('btnReset').addEventListener('click', resetAll);
    document.getElementById('btnHistory').addEventListener('click', toggleHistory);
    document.getElementById('btnCloseHistory').addEventListener('click', toggleHistory);

    // Initialize
    loadState();
    ensureRequestPool();
    render();
  </script>
</body>
</html>
