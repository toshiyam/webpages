<!doctype html>
<!--
name: ワンタップ休憩ガイド
version: 1.0
type: single-html-app
status: stable
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ワンタップ休憩ガイド</title>
<style>
  :root {
    color-scheme: light;
    --bg: #eef4f5;
    --card: #ffffff;
    --text: #1f2b2d;
    --muted: #667375;
    --line: #dbe6e7;
    --accent: #2f8f8a;
    --accent-soft: #e4f4f2;
  }
  * { box-sizing: border-box; }
  html, body { touch-action: manipulation; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.6;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button { font: inherit; cursor: pointer; }
  .app {
    max-width: 440px;
    margin: 0 auto;
    padding: 18px 14px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 14px;
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 1.2rem;
  }
  header .lead {
    color: var(--muted);
    font-size: 0.78rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 0.95rem;
  }
  .modes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .mode-btn {
    min-height: 62px;
    border: 2px solid var(--line);
    border-radius: 12px;
    background: #fbfefe;
    color: var(--text);
    padding: 8px 4px;
  }
  .mode-btn strong {
    display: block;
    font-size: 1.05rem;
  }
  .mode-btn span {
    display: block;
    margin-top: 3px;
    font-size: 0.66rem;
    color: var(--muted);
  }
  .mode-btn.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .mode-btn.selected span { color: var(--accent); font-weight: 700; }
  .mode-btn:disabled {
    opacity: 0.55;
  }
  .stage {
    text-align: center;
    padding: 10px 6px 4px;
  }
  .circle-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 190px;
  }
  .breath-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 3px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0.62);
    transition: transform 4s ease;
  }
  .breath-circle .phase-label {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--accent);
  }
  .status-note {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .time-line {
    margin-top: 10px;
    font-size: 0.9rem;
  }
  .time-line b {
    font-size: 1.3rem;
  }
  .complete-msg {
    margin-top: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.9rem;
    font-weight: 700;
  }
  .controls {
    margin-top: 16px;
    display: grid;
    gap: 10px;
  }
  .start-btn {
    min-height: 52px;
    border: 0;
    border-radius: 13px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
  }
  .stop-btn {
    min-height: 48px;
    border: 1px solid var(--accent);
    border-radius: 12px;
    background: #fff;
    color: var(--accent);
    font-size: 0.95rem;
    font-weight: 700;
  }
  .disclaimer {
    margin-top: 4px;
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ワンタップ休憩ガイド</h1>
    <div class="lead">短時間で気分を切り替える休憩タイマー</div>
  </header>

  <section class="card">
    <h2>休憩の長さを選ぶ</h2>
    <div class="modes" id="modeButtons">
      <button type="button" class="mode-btn" data-duration="30"><strong>30秒</strong><span>すぐ整える</span></button>
      <button type="button" class="mode-btn" data-duration="60"><strong>1分</strong><span>標準</span></button>
      <button type="button" class="mode-btn" data-duration="120"><strong>2分</strong><span>しっかり</span></button>
    </div>
  </section>

  <section class="card stage">
    <div class="circle-wrap">
      <div class="breath-circle" id="breathCircle">
        <span class="phase-label" id="phaseLabel">開始前</span>
      </div>
    </div>
    <div class="status-note" id="statusNote">モードを選んで「休憩を始める」を押してください。</div>
    <div class="time-line" id="timeLine" hidden>残り <b id="remainSeconds">0</b> 秒</div>
    <div class="complete-msg" id="completeMsg" hidden>おつかれさまでした。休憩が終わりました。</div>

    <div class="controls">
      <button type="button" id="startBtn" class="start-btn">休憩を始める</button>
      <button type="button" id="stopBtn" class="stop-btn" hidden>休憩を止める</button>
    </div>
    <div class="disclaimer">医療的な効果を保証するものではありません。無理のない範囲でご利用ください。</div>
  </section>
</div>

<script>
(function () {
  'use strict';

  var MODES = [30, 60, 120];
  var DEFAULT_DURATION = 60;

  var PHASES = [
    { key: 'inhale', label: 'すう', dur: 4 },
    { key: 'hold', label: 'とめる', dur: 2 },
    { key: 'exhale', label: 'はく', dur: 6 }
  ];
  var CYCLE_LEN = PHASES.reduce(function (sum, p) { return sum + p.dur; }, 0);

  var state = {
    status: 'idle',
    duration: DEFAULT_DURATION,
    startedAt: 0,
    intervalId: null,
    lastPhaseKey: null
  };
  var els = {};

  function isValidDuration(v) {
    return MODES.indexOf(v) !== -1;
  }

  function setDuration(v) {
    state.duration = isValidDuration(v) ? v : DEFAULT_DURATION;
    renderModeButtons();
  }

  function renderModeButtons() {
    els.modeBtns.forEach(function (btn) {
      var v = Number(btn.dataset.duration);
      btn.classList.toggle('selected', v === state.duration);
      btn.disabled = state.status === 'running';
    });
  }

  function phaseAt(elapsedInCycle) {
    var acc = 0;
    for (var i = 0; i < PHASES.length; i++) {
      var p = PHASES[i];
      if (elapsedInCycle < acc + p.dur) {
        return { phase: p, remainInPhase: (acc + p.dur) - elapsedInCycle };
      }
      acc += p.dur;
    }
    var last = PHASES[PHASES.length - 1];
    return { phase: last, remainInPhase: last.dur };
  }

  function applyCircleForPhase(phaseKey) {
    if (phaseKey === state.lastPhaseKey) return;
    state.lastPhaseKey = phaseKey;
    if (phaseKey === 'inhale') {
      els.circle.style.transition = 'transform ' + 4 + 's ease';
      els.circle.style.transform = 'scale(1)';
    } else if (phaseKey === 'hold') {
      els.circle.style.transition = 'transform 0s';
      els.circle.style.transform = 'scale(1)';
    } else if (phaseKey === 'exhale') {
      els.circle.style.transition = 'transform ' + 6 + 's ease';
      els.circle.style.transform = 'scale(0.62)';
    } else {
      els.circle.style.transition = 'transform 0.4s ease';
      els.circle.style.transform = 'scale(0.62)';
    }
  }

  function clearTimer() {
    if (state.intervalId !== null) {
      window.clearInterval(state.intervalId);
      state.intervalId = null;
    }
  }

  function tick() {
    var elapsed = (Date.now() - state.startedAt) / 1000;
    if (elapsed >= state.duration) {
      finishSession();
      return;
    }
    var cyclePos = elapsed % CYCLE_LEN;
    var info = phaseAt(cyclePos);
    applyCircleForPhase(info.phase.key);
    els.phaseLabel.textContent = info.phase.label;
    els.remainSeconds.textContent = String(Math.max(0, Math.ceil(state.duration - elapsed)));
    els.statusNote.textContent = '休憩中です。呼吸に合わせて円の動きを見てください。';
  }

  function startSession() {
    if (state.status === 'running') return;
    clearTimer();
    state.status = 'running';
    state.startedAt = Date.now();
    state.lastPhaseKey = null;

    els.completeMsg.hidden = true;
    els.timeLine.hidden = false;
    els.startBtn.hidden = true;
    els.stopBtn.hidden = false;
    renderModeButtons();

    tick();
    state.intervalId = window.setInterval(tick, 200);
  }

  function stopSession() {
    if (state.status !== 'running') return;
    clearTimer();
    state.status = 'stopped';
    applyCircleForPhase('idle');
    els.phaseLabel.textContent = '停止しました';
    els.statusNote.textContent = 'いつでもまた休憩を始められます。';
    els.timeLine.hidden = true;
    els.startBtn.hidden = false;
    els.stopBtn.hidden = true;
    renderModeButtons();
  }

  function finishSession() {
    clearTimer();
    state.status = 'completed';
    applyCircleForPhase('idle');
    els.phaseLabel.textContent = '完了';
    els.statusNote.textContent = '';
    els.timeLine.hidden = true;
    els.completeMsg.hidden = false;
    els.startBtn.hidden = false;
    els.stopBtn.hidden = true;
    renderModeButtons();
  }

  function init() {
    els.modeBtns = Array.prototype.slice.call(document.querySelectorAll('.mode-btn'));
    els.circle = document.getElementById('breathCircle');
    els.phaseLabel = document.getElementById('phaseLabel');
    els.statusNote = document.getElementById('statusNote');
    els.timeLine = document.getElementById('timeLine');
    els.remainSeconds = document.getElementById('remainSeconds');
    els.completeMsg = document.getElementById('completeMsg');
    els.startBtn = document.getElementById('startBtn');
    els.stopBtn = document.getElementById('stopBtn');

    els.modeBtns.forEach(function (btn) {
      btn.addEventListener('click', function () {
        if (state.status === 'running') return;
        setDuration(Number(btn.dataset.duration));
      });
    });

    els.startBtn.addEventListener('click', startSession);
    els.stopBtn.addEventListener('click', stopSession);

    setDuration(DEFAULT_DURATION);
    renderModeButtons();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
