<!doctype html>
<!--
name: ポケットダンジョンラン
version: 1.0
type: single-html-app
status: stable
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ポケットダンジョンラン</title>
<style>
:root{color-scheme:dark;--bg:#201a2c;--card:#2b2340;--line:#453a63;--text:#f1ecdf;--muted:#a89bc4;--accent:#e0a94a;--good:#4caf7d;--warn:#e0a94a;--danger:#d9534f;--soft:#241d36;--danger-soft:#4a2226}*{box-sizing:border-box}html,body{touch-action:manipulation}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;line-height:1.55;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}button{font:inherit;cursor:pointer}.app{max-width:480px;margin:0 auto;padding:16px 12px 40px}header{text-align:center;margin-bottom:12px}h1{margin:0 0 2px;font-size:1.25rem}.lead{color:var(--muted);font-size:.78rem}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}.card h2{margin:0 0 12px;font-size:1rem}.card h3{margin:14px 0 8px;font-size:.85rem;color:var(--muted)}.banner{padding:10px 12px;border-radius:10px;font-size:.85rem;margin-bottom:12px;background:var(--danger-soft);color:#f3b6b2;border:1px solid #6b3a38}.primary,.secondary,.ghost,.danger{width:100%;min-height:46px;border-radius:12px;font-weight:700}.primary{border:0;background:var(--accent);color:#2a1c05;min-height:52px}.secondary{border:1px solid var(--accent);background:transparent;color:var(--accent)}.ghost{border:1px solid var(--line);background:transparent;color:var(--muted)}.danger{border:1px solid #6b3a38;background:var(--danger-soft);color:#f3b6b2;margin-top:14px;font-size:.84rem}button:disabled{opacity:.45}.stat-row{display:flex;align-items:center;justify-content:space-between;background:var(--soft);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:.9rem}.stat-row b{font-size:1.15rem;color:var(--accent)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}.box{background:var(--soft);border-radius:12px;padding:8px 4px;text-align:center}.box span{display:block;font-size:.66rem;color:var(--muted)}.box b{display:block;margin-top:2px;font-size:1.05rem}.hp{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:.8rem}.bar{flex:1;height:14px;background:var(--soft);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.fill{height:100%;background:var(--good);transition:width .3s ease,background-color .3s ease}.fill.low{animation:pulse 1s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}.hint{background:var(--danger-soft);color:#f3b6b2;border-radius:10px;padding:8px 10px;font-size:.78rem;margin-bottom:10px}.event{background:var(--soft);border-radius:12px;padding:10px 12px;margin-bottom:14px}.label{font-size:.68rem;color:var(--muted);margin-bottom:4px}.actions{display:grid;gap:9px}.history,.log{list-style:none;margin:0;padding:0;display:grid;gap:6px}.history li{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--soft);border-radius:10px;padding:8px 10px;font-size:.8rem}.date{color:var(--muted);font-size:.72rem}.success{color:var(--good)}.retreat{color:var(--accent)}.failure{color:var(--danger)}.empty{color:var(--muted);font-size:.82rem;padding:6px 2px}.log-wrap{margin-top:14px}.log{max-height:220px;overflow-y:auto}.log li{background:var(--soft);border-radius:8px;padding:7px 9px;font-size:.78rem;color:var(--muted)}.log b{color:var(--text)}.result{text-align:center}.result-title{font-size:1.2rem;font-weight:800;margin-bottom:8px}.result-body{font-size:.9rem;color:var(--muted);margin-bottom:14px}
</style>
</head>
<body>
<div class="app">
<header><h1>ポケットダンジョンラン</h1><div class="lead">短時間で遊べるポケット探索ローグライク</div></header>
<div id="banner" class="banner" hidden></div>
<section id="result" class="card result" hidden><div id="resultTitle" class="result-title"></div><div id="resultBody" class="result-body"></div><button id="closeResult" class="primary" type="button">閉じる</button></section>
<section id="start" class="card" hidden><h2>探索の準備</h2><div class="stat-row"><span>最高スコア</span><b id="high">0</b></div><button id="startBtn" class="primary" type="button">新規探索を始める</button><h3>直近の履歴</h3><ul id="history" class="history"></ul><div id="empty" class="empty" hidden>まだ探索記録がありません。</div><button id="reset" class="danger" type="button" hidden>保存データをリセット</button></section>
<section id="run" class="card" hidden><div class="grid"><div class="box"><span>階層</span><b id="floor">1</b></div><div class="box"><span>スコア</span><b id="score">0</b></div><div class="box"><span>ポーション</span><b id="potions">0</b></div></div><div class="hp"><span>HP</span><div class="bar"><div id="fill" class="fill"></div></div><span id="hpText">100/100</span></div><div id="hint" class="hint" hidden>次に「進む」を選ぶと最深部のボスと対峙します。</div><div class="event"><div class="label">現在イベント</div><div id="eventText"></div></div><div class="actions"><button id="advance" class="primary" type="button">進む</button><button id="rest" class="secondary" type="button">休む / 応急処置</button><button id="potion" class="secondary" type="button">ポーション使用</button><button id="retreat" class="ghost" type="button">撤退する（成果を持ち帰る）</button></div><div class="log-wrap"><div class="label">探索ログ</div><ul id="log" class="log"></ul></div></section>
</div>
<script>
(function(){'use strict';
var KEY='pocketDungeonRun:v1',MAX=100,INIT=3,PMAX=6,PHEAL=34,BOSS=10,HMAX=10,LMAX=40,busy=false;
var state={run:null,highScore:0,history:[],lastResult:null},el={};
var weights={early:{enemy:20,treasure:26,trap:14,spring:20,merchant:15,safe:5},mid:{enemy:30,treasure:20,trap:20,spring:14,merchant:11,safe:5},late:{enemy:38,treasure:15,trap:26,spring:9,merchant:8,safe:4}};
function $(id){return document.getElementById(id)}function obj(v){return v&&typeof v==='object'&&!Array.isArray(v)}function clamp(v,a,b){return Math.min(b,Math.max(a,v))}function num(v,f){v=Number(v);return Number.isFinite(v)?Math.floor(v):f}function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}function pad(n){return n<10?'0'+n:''+n}function now(){var d=new Date();return d.getFullYear()+'/'+pad(d.getMonth()+1)+'/'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes())}function banner(t){el.banner.textContent=t;el.banner.hidden=false}function hideBanner(){el.banner.hidden=true}
function pick(pool){var ks=Object.keys(pool),total=ks.reduce(function(s,k){return s+pool[k]},0),r=Math.random()*total,a=0;for(var i=0;i<ks.length;i++){a+=pool[ks[i]];if(r<a)return ks[i]}return ks[ks.length-1]}
function cleanLog(raw){var out=[];if(!Array.isArray(raw))return out;for(var i=0;i<raw.length&&out.length<LMAX;i++){if(typeof raw[i]==='string'&&raw[i])out.push(raw[i].slice(0,200))}return out}
function cleanRun(raw){if(!obj(raw)||raw.status!=='active')return null;var max=num(raw.maxHp,MAX);if(max<=0)max=MAX;var hp=clamp(num(raw.hp,max),0,max);if(hp<=0)return null;return{floor:clamp(num(raw.floor,1),1,BOSS),hp:hp,maxHp:max,potions:clamp(num(raw.potions,0),0,PMAX),score:Math.max(0,num(raw.score,0)),log:cleanLog(raw.log),lastEventText:typeof raw.lastEventText==='string'?raw.lastEventText.slice(0,200):'',status:'active'}}
function cleanHistory(x){if(!obj(x)||['success','retreat','failure'].indexOf(x.status)<0)return null;var d=typeof x.date==='string'&&x.date?x.date.slice(0,40):'';if(!d)return null;return{date:d,floor:clamp(num(x.floor,1),1,BOSS),score:Math.max(0,num(x.score,0)),status:x.status}}
function load(){try{var raw=localStorage.getItem(KEY);if(!raw)return{run:null,highScore:0,history:[]};var p=JSON.parse(raw);if(!obj(p))throw Error('shape');var h=[];(Array.isArray(p.history)?p.history:[]).forEach(function(e){if(h.length<HMAX){e=cleanHistory(e);if(e)h.push(e)}});return{run:cleanRun(p.run),highScore:Math.max(0,num(p.highScore,0)),history:h}}catch(e){banner('保存データを読み込めなかったため、初期状態から始めます。');return{run:null,highScore:0,history:[]}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify({run:state.run,highScore:state.highScore,history:state.history}))}catch(e){banner('保存できませんでした。この画面を閉じるとプレイ内容は失われますが、続けてプレイできます。')}}
function log(run,text){run.log.unshift(text);if(run.log.length>LMAX)run.log.length=LMAX}
function normal(f){var tier=f<=4?'early':f<=7?'mid':'late',k=pick(weights[tier]),d,r,h,roll;switch(k){case'enemy':d=rnd(6+f*2,13+f*3);r=rnd(10+f*4,18+f*6);return{hp:-d,score:r,potion:0,text:f+'階で敵と遭遇した。'+d+'ダメージを受けたが撃退し、'+r+'点を獲得した。'};case'trap':d=rnd(5+f*2,11+f*2);return{hp:-d,score:0,potion:0,text:f+'階で罠を踏んでしまった。'+d+'ダメージを受けた。'};case'treasure':r=rnd(14+f*5,28+f*7);if(Math.random()<.12){d=rnd(4+f,9+f);return{hp:-d,score:r,potion:0,text:f+'階で宝箱を見つけたが罠仕掛けだった。'+d+'ダメージを受けつつ'+r+'点を得た。'}}return{hp:0,score:r,potion:0,text:f+'階で宝箱を見つけた。'+r+'点を獲得した。'};case'spring':h=rnd(16,26);return{hp:h,score:0,potion:0,text:f+'階で回復の泉を見つけた。HPが'+h+'回復した。'};case'merchant':roll=Math.random();if(roll<.45)return{hp:0,score:0,potion:1,text:f+'階で商人に出会い、ポーションを1つ手に入れた。'};if(roll<.75){r=rnd(8,16);return{hp:0,score:r,potion:0,text:f+'階で商人と取引し、'+r+'点分の品を売った。'}}h=rnd(8,14);return{hp:h,score:0,potion:0,text:f+'階で補給を受け、HPが'+h+'回復した。'};default:if(Math.random()<.35){r=rnd(3,9);return{hp:0,score:r,potion:0,text:f+'階は静かだった。小銭を'+r+'点拾った。'}}return{hp:0,score:0,potion:0,text:f+'階は特に何も起こらなかった。'}}}
function boss(){var d=rnd(28,42),r=rnd(120,170);return{hp:-d,score:r,potion:0,text:'最深部でボスと激突した。'+d+'ダメージを受けながらも死闘の末に撃破し、'+r+'点を獲得した！'}}function restEvent(f){if(Math.random()<Math.min(.28,.10+f*.015)){var d=rnd(6+Math.floor(f*1.2),12+Math.floor(f*1.6));return{hp:-d,score:0,potion:0,text:'休もうとした矢先、奇襲を受けた！'+d+'ダメージ。'}}var h=rnd(14,22);return{hp:h,score:0,potion:0,text:'応急処置を行い、HPが'+h+'回復した。'}}
function apply(run,o){run.hp=clamp(run.hp+o.hp,0,run.maxHp);run.score=Math.max(0,run.score+o.score);run.potions=clamp(run.potions+o.potion,0,PMAX);log(run,o.text);run.lastEventText=o.text;return run.hp<=0}
function finish(status){var run=state.run;state.history.unshift({date:now(),floor:run.floor,score:run.score,status:status});if(state.history.length>HMAX)state.history.length=HMAX;state.highScore=Math.max(state.highScore,run.score);state.lastResult={status:status,floor:run.floor,score:run.score};state.run=null;save();render()}
function start(){if(busy||state.run)return;busy=true;hideBanner();state.lastResult=null;state.run={floor:1,hp:MAX,maxHp:MAX,potions:INIT,score:0,log:[],lastEventText:'洞窟の入り口に立った。奥へ進むか、ここで引き返すか選べる。',status:'active'};save();render();busy=false}
function advance(){if(busy||!state.run)return;busy=true;var run=state.run,n=run.floor+1,isBoss=n>=BOSS,o=isBoss?boss():normal(n),dead=apply(run,o);if(dead){run.floor=Math.min(n,BOSS);finish('failure')}else if(isBoss){run.floor=BOSS;finish('success')}else{run.floor=n;save();render()}busy=false}
function rest(){if(busy||!state.run)return;busy=true;if(apply(state.run,restEvent(state.run.floor)))finish('failure');else{save();render()}busy=false}
function potion(){if(busy||!state.run||state.run.potions<=0)return;busy=true;apply(state.run,{hp:PHEAL,score:0,potion:-1,text:'ポーションを使い、HPが'+PHEAL+'回復した。'});save();render();busy=false}
function retreat(){if(busy||!state.run)return;busy=true;finish('retreat');busy=false}
function label(s){return s==='success'?'探索成功':s==='retreat'?'撤退成功':'探索失敗'}
function renderHistory(){el.history.innerHTML='';if(!state.history.length){el.empty.hidden=false;return}el.empty.hidden=true;state.history.forEach(function(e){var li=document.createElement('li'),left=document.createElement('span'),st=document.createElement('span'),dt=document.createElement('span'),right=document.createElement('span');st.className=e.status;st.textContent=label(e.status);dt.className='date';dt.textContent=' '+e.date;left.appendChild(st);left.appendChild(dt);right.textContent=e.floor+'階 / '+e.score+'点';li.appendChild(left);li.appendChild(right);el.history.appendChild(li)})}
function renderLog(run){el.log.innerHTML='';run.log.forEach(function(t,i){var li=document.createElement('li'),b=document.createElement('b');b.textContent=(run.log.length-i)+'. ';li.appendChild(b);li.appendChild(document.createTextNode(t));el.log.appendChild(li)})}
function render(){el.high.textContent=String(state.highScore);el.reset.hidden=!(state.highScore>0||state.history.length>0);renderHistory();if(state.lastResult){el.result.hidden=false;el.resultTitle.className='result-title '+state.lastResult.status;el.resultTitle.textContent=label(state.lastResult.status);el.resultBody.textContent='到達階層: '+state.lastResult.floor+'階 / 最終スコア: '+state.lastResult.score+'点'}else el.result.hidden=true;var run=state.run;if(!run){el.start.hidden=false;el.run.hidden=true;return}el.start.hidden=true;el.run.hidden=false;el.floor.textContent=String(run.floor);el.score.textContent=String(run.score);el.potions.textContent=String(run.potions);var pct=clamp(Math.round(run.hp/run.maxHp*100),0,100);el.fill.style.width=pct+'%';el.hpText.textContent=run.hp+'/'+run.maxHp;el.fill.style.backgroundColor=pct<=25?'var(--danger)':pct<=50?'var(--warn)':'var(--good)';el.fill.classList.toggle('low',pct<=25);el.hint.hidden=run.floor!==BOSS-1;el.eventText.textContent=run.lastEventText||'';el.potion.disabled=run.potions<=0;renderLog(run)}
function init(){['banner','result','resultTitle','resultBody','start','high','history','empty','reset','run','floor','score','potions','fill','hpText','hint','eventText','potion','log'].forEach(function(id){el[id]=$(id)});$('startBtn').addEventListener('click',start);$('reset').addEventListener('click',function(){if(!busy&&confirm('保存されている探索データ・最高スコア・履歴をすべて削除します。よろしいですか？')){state={run:null,highScore:0,history:[],lastResult:null};save();render()}});$('closeResult').addEventListener('click',function(){state.lastResult=null;render()});$('advance').addEventListener('click',advance);$('rest').addEventListener('click',rest);$('potion').addEventListener('click',potion);$('retreat').addEventListener('click',retreat);var loaded=load();state.run=loaded.run;state.highScore=loaded.highScore;state.history=loaded.history;render()}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
