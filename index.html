<!doctype html>
<!--
name: 1HTMLs 公開作品インデックス
version: 1.0
type: single-html-app
status: stable
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1HTMLs 公開作品</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7fb;
    --panel: #ffffff;
    --panel-soft: #f0f3f8;
    --text: #1f2937;
    --muted: #667085;
    --line: #d9e0ea;
    --accent: #2563eb;
    --accent-soft: #e8efff;
    --danger: #b42318;
    --shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101418;
      --panel: #171d24;
      --panel-soft: #202832;
      --text: #e8eef7;
      --muted: #aab4c3;
      --line: #303a46;
      --accent: #7aa7ff;
      --accent-soft: #182338;
      --danger: #ffb4a8;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.30);
    }
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
  }

  body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(circle at top left, var(--accent-soft), transparent 34rem), var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.65;
  }

  a {
    color: inherit;
  }

  .wrap {
    width: min(1080px, 100%);
    margin: 0 auto;
    padding: 28px 16px 44px;
  }

  .hero {
    padding: 28px 0 20px;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 12px;
    padding: 5px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: color-mix(in srgb, var(--panel) 72%, transparent);
    color: var(--muted);
    font-size: 0.84rem;
  }

  h1 {
    margin: 0;
    font-size: clamp(2rem, 8vw, 4.1rem);
    line-height: 1.05;
    letter-spacing: -0.06em;
  }

  .lead {
    max-width: 720px;
    margin: 16px 0 0;
    color: var(--muted);
    font-size: 1rem;
  }

  .toolbar {
    position: sticky;
    top: 0;
    z-index: 5;
    display: grid;
    gap: 10px;
    padding: 12px;
    margin: 14px 0 18px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: color-mix(in srgb, var(--panel) 88%, transparent);
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
  }

  .search-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  input,
  select,
  button {
    width: 100%;
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--panel);
    color: var(--text);
    font: inherit;
  }

  input,
  select {
    padding: 0 12px;
  }

  button {
    cursor: pointer;
    font-weight: 700;
  }

  button:hover,
  button:focus-visible,
  .card:focus-within {
    border-color: var(--accent);
  }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    padding: 3px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--panel-soft);
    color: var(--muted);
    font-size: 0.86rem;
  }

  .status {
    margin: 18px 0;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: var(--panel);
    color: var(--muted);
  }

  .status.error {
    border-color: color-mix(in srgb, var(--danger) 55%, var(--line));
    color: var(--danger);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .card {
    display: grid;
    gap: 12px;
    padding: 18px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: color-mix(in srgb, var(--panel) 94%, transparent);
    box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card h2 {
    margin: 0;
    font-size: 1.14rem;
    line-height: 1.35;
  }

  .card h2 a {
    text-decoration: none;
  }

  .card h2 a:hover,
  .card h2 a:focus-visible {
    color: var(--accent);
    text-decoration: underline;
  }

  .desc {
    margin: 0;
    color: var(--muted);
    font-size: 0.94rem;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .meta code {
    padding: 2px 7px;
    border-radius: 999px;
    background: var(--panel-soft);
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.78rem;
  }

  .open-link {
    display: inline-flex;
    justify-content: center;
    align-items: center;
    min-height: 40px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    white-space: nowrap;
  }

  .open-link:hover,
  .open-link:focus-visible {
    filter: brightness(1.05);
  }

  .empty {
    padding: 28px 18px;
    border: 1px dashed var(--line);
    border-radius: 22px;
    background: color-mix(in srgb, var(--panel) 68%, transparent);
    color: var(--muted);
    text-align: center;
  }

  footer {
    margin-top: 28px;
    color: var(--muted);
    font-size: 0.86rem;
  }

  .hidden {
    display: none !important;
  }

  @media (min-width: 700px) {
    .search-row {
      grid-template-columns: minmax(0, 1fr) 180px 120px;
    }

    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>
  <main class="wrap">
    <section class="hero" aria-labelledby="page-title">
      <p class="eyebrow">HTML 1ファイル完結アプリ集</p>
      <h1 id="page-title">1HTMLs 公開作品</h1>
      <p class="lead">GitHub Pagesで公開している作品を自動で読み込みます。作品名、ファイル名、メタ情報から検索できます。</p>
    </section>

    <section class="toolbar" aria-label="作品の検索と並び替え">
      <div class="search-row">
        <label>
          <span class="hidden">検索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="作品名・説明・ファイル名で検索">
        </label>
        <label>
          <span class="hidden">並び替え</span>
          <select id="sortSelect">
            <option value="name">名前順</option>
            <option value="updated">更新日が新しい順</option>
            <option value="file">ファイル名順</option>
          </select>
        </label>
        <button id="reloadButton" type="button">再読込</button>
      </div>
      <div class="stats" aria-live="polite">
        <span class="pill" id="totalCount">読み込み中</span>
        <span class="pill" id="visibleCount">表示 0件</span>
        <span class="pill" id="updatedAt">更新確認中</span>
      </div>
    </section>

    <div id="statusBox" class="status">公開作品を読み込んでいます。</div>
    <section id="appGrid" class="grid" aria-label="公開作品一覧"></section>
    <div id="emptyBox" class="empty hidden">条件に合う作品がありません。</div>

    <footer>
      <p>一覧は <code>toshiyam/webpages</code> リポジトリ直下のHTMLファイルから生成しています。</p>
    </footer>
  </main>

<script>
(function () {
  'use strict';

  const REPO_API = 'https://api.github.com/repos/toshiyam/webpages/contents/';
  const state = {
    apps: [],
    query: '',
    sort: 'name'
  };

  const els = {
    grid: document.getElementById('appGrid'),
    status: document.getElementById('statusBox'),
    empty: document.getElementById('emptyBox'),
    search: document.getElementById('searchInput'),
    sort: document.getElementById('sortSelect'),
    reload: document.getElementById('reloadButton'),
    total: document.getElementById('totalCount'),
    visible: document.getElementById('visibleCount'),
    updatedAt: document.getElementById('updatedAt')
  };

  function escapeHtml(value) {
    return String(value).replace(/[&<>"]/g, function (char) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[char];
    });
  }

  function normalizeText(value) {
    return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
  }

  function fileBaseName(fileName) {
    return fileName.replace(/\.html$/i, '').replace(/[-_]+/g, ' ').trim();
  }

  function parseMetaBlock(source) {
    const result = {};
    const commentMatch = source.match(/<!doctype\s+html>\s*<!--[\s\S]*?-->/i);
    if (!commentMatch) {
      return result;
    }

    const block = commentMatch[0];
    ['name', 'version', 'type', 'status'].forEach(function (key) {
      const match = block.match(new RegExp('^\\s*' + key + '\\s*:\\s*(.+?)\\s*$', 'mi'));
      if (match) {
        result[key] = match[1].trim();
      }
    });
    return result;
  }

  function parseTitle(source) {
    const match = source.match(/<title>([\s\S]*?)<\/title>/i);
    return match ? match[1].replace(/\s+/g, ' ').trim() : '';
  }

  function parseDescription(source) {
    const meta = source.match(/<meta\s+name=["']description["']\s+content=["']([^"']+)["']/i);
    if (meta) {
      return meta[1].trim();
    }

    const firstHeading = source.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
    if (!firstHeading) {
      return '';
    }

    return firstHeading[1]
      .replace(/<[^>]+>/g, '')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function formatDate(value) {
    if (!value) {
      return '更新日不明';
    }
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
      return '更新日不明';
    }
    return new Intl.DateTimeFormat('ja-JP', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).format(date);
  }

  async function fetchJson(url) {
    const response = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' } });
    if (!response.ok) {
      throw new Error('GitHub APIの取得に失敗しました。status=' + response.status);
    }
    return response.json();
  }

  async function fetchText(url) {
    const response = await fetch(url, { cache: 'no-store' });
    if (!response.ok) {
      throw new Error('HTMLファイルの取得に失敗しました。status=' + response.status);
    }
    return response.text();
  }

  async function loadApps() {
    setLoading(true);
    showStatus('公開作品を読み込んでいます。', false);

    try {
      const entries = await fetchJson(REPO_API);
      const files = entries
        .filter(function (entry) {
          return entry.type === 'file' && /\.html$/i.test(entry.name) && entry.name.toLowerCase() !== 'index.html';
        })
        .sort(function (a, b) {
          return a.name.localeCompare(b.name, 'ja');
        });

      const apps = await Promise.all(files.map(async function (file) {
        const source = await fetchText(file.download_url);
        const meta = parseMetaBlock(source);
        const title = meta.name || parseTitle(source) || fileBaseName(file.name);
        const description = parseDescription(source);

        return {
          fileName: file.name,
          path: './' + encodeURIComponent(file.name),
          title: title,
          description: description,
          version: meta.version || '',
          status: meta.status || '',
          type: meta.type || '',
          updated: file.git_url ? '' : '',
          sha: file.sha || '',
          searchText: normalizeText([title, description, file.name, meta.version, meta.status, meta.type].join(' '))
        };
      }));

      state.apps = apps;
      els.total.textContent = '全 ' + apps.length + '件';
      els.updatedAt.textContent = '確認 ' + new Intl.DateTimeFormat('ja-JP', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      }).format(new Date());
      showStatus(apps.length ? '読み込み完了。' : '公開作品がまだ見つかりません。', false);
      render();
    } catch (error) {
      state.apps = [];
      els.total.textContent = '取得失敗';
      els.visible.textContent = '表示 0件';
      showStatus(error.message || '読み込みに失敗しました。', true);
      render();
    } finally {
      setLoading(false);
    }
  }

  function setLoading(isLoading) {
    els.reload.disabled = isLoading;
    els.reload.textContent = isLoading ? '読込中' : '再読込';
  }

  function showStatus(message, isError) {
    els.status.textContent = message;
    els.status.classList.toggle('error', Boolean(isError));
    els.status.classList.toggle('hidden', !message);
  }

  function getFilteredApps() {
    const query = normalizeText(state.query);
    const filtered = state.apps.filter(function (app) {
      return !query || app.searchText.includes(query);
    });

    filtered.sort(function (a, b) {
      if (state.sort === 'file') {
        return a.fileName.localeCompare(b.fileName, 'ja');
      }
      if (state.sort === 'updated') {
        return b.sha.localeCompare(a.sha);
      }
      return a.title.localeCompare(b.title, 'ja');
    });

    return filtered;
  }

  function render() {
    const apps = getFilteredApps();
    els.visible.textContent = '表示 ' + apps.length + '件';
    els.empty.classList.toggle('hidden', apps.length > 0 || state.apps.length === 0);

    els.grid.innerHTML = apps.map(function (app) {
      const detail = app.description && app.description !== app.title
        ? app.description
        : 'HTML 1ファイルで動く公開作品です。';
      const metaParts = [
        app.version ? 'version: ' + app.version : '',
        app.status ? 'status: ' + app.status : '',
        app.type ? 'type: ' + app.type : '',
        app.fileName
      ].filter(Boolean);

      return '<article class="card">' +
        '<div class="card-head">' +
          '<h2><a href="' + escapeHtml(app.path) + '">' + escapeHtml(app.title) + '</a></h2>' +
          '<a class="open-link" href="' + escapeHtml(app.path) + '">開く</a>' +
        '</div>' +
        '<p class="desc">' + escapeHtml(detail) + '</p>' +
        '<div class="meta">' + metaParts.map(function (item) {
          return '<code>' + escapeHtml(item) + '</code>';
        }).join('') + '</div>' +
      '</article>';
    }).join('');
  }

  els.search.addEventListener('input', function (event) {
    state.query = event.target.value;
    render();
  });

  els.sort.addEventListener('change', function (event) {
    state.sort = event.target.value;
    render();
  });

  els.reload.addEventListener('click', loadApps);

  loadApps();
}());
</script>
</body>
</html>
