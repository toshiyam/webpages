<!doctype html>
<!--
name: 補給線フォーキャスター
version: 0.1
type: single-html-app
status: draft
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>補給線フォーキャスター</title>
<style>
  :root {
    color-scheme: light;
    --bg: #eef1f6;
    --card: #ffffff;
    --line: #d8dee9;
    --soft: #f4f7fb;
    --text: #232833;
    --muted: #6d7585;
    --accent: #2f6db3;
    --accent-soft: #e6effb;
    --good: #2f9e63;
    --good-soft: #e4f6ec;
    --warn: #c8890c;
    --warn-soft: #fdf3d8;
    --danger: #cf4437;
    --danger-soft: #fce9e7;
  }
  * { box-sizing: border-box; }
  html, body { touch-action: manipulation; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.55;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button { font: inherit; cursor: pointer; }
  button:disabled { opacity: 0.45; cursor: default; }
  input, select, textarea { font: inherit; }
  .app { max-width: 560px; margin: 0 auto; padding: 14px 12px 48px; }
  header { text-align: center; margin-bottom: 10px; }
  header h1 { margin: 0 0 2px; font-size: 1.2rem; }
  header .lead { color: var(--muted); font-size: 0.76rem; }
  .banner {
    padding: 9px 11px; border-radius: 10px; font-size: 0.82rem; margin: 8px 0;
    background: var(--danger-soft); color: #a1281f; border: 1px solid #f0b9ac;
  }
  .day-bar {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
    margin: 8px 0; font-size: 0.74rem;
  }
  .day-chip {
    background: var(--soft); border: 1px solid var(--line); border-radius: 999px;
    padding: 3px 10px; color: var(--muted);
  }
  .day-chip b { color: var(--accent); }
  .tabs {
    display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    padding: 6px 0; margin-bottom: 8px; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 0 0 auto; min-height: 42px; padding: 6px 14px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--soft); color: var(--muted);
    font-size: 0.84rem; white-space: nowrap;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 13px; margin-bottom: 11px;
  }
  .card h2 { margin: 0 0 10px; font-size: 0.95rem; }
  .card h3 { margin: 12px 0 7px; font-size: 0.8rem; color: var(--muted); }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
  .sum-box { background: var(--soft); border-radius: 11px; padding: 8px 4px; text-align: center; }
  .sum-box span { display: block; font-size: 0.62rem; color: var(--muted); }
  .sum-box b { display: block; margin-top: 1px; font-size: 1.02rem; color: var(--accent); }
  .sum-box.danger b { color: var(--danger); }
  .sum-box.warn b { color: var(--warn); }
  .field { margin-bottom: 9px; }
  .field label { display: block; font-size: 0.76rem; color: var(--muted); margin-bottom: 3px; }
  .field input[type="text"], .field input[type="number"], .field input[type="date"], .field select, .field textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #fbfcfe;
    color: var(--text); padding: 9px 11px; font-size: 0.92rem;
  }
  .field textarea { min-height: 46px; resize: vertical; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .primary-btn {
    width: 100%; min-height: 48px; border: 0; border-radius: 12px;
    background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700;
  }
  .ghost-btn {
    min-height: 42px; padding: 6px 12px; border-radius: 10px; font-size: 0.8rem;
    border: 1px solid var(--line); background: transparent; color: var(--muted);
  }
  .danger-btn {
    width: 100%; min-height: 46px; border-radius: 11px; font-size: 0.85rem;
    border: 1px solid #f0b9ac; background: var(--danger-soft); color: var(--danger);
  }
  .form-error {
    margin: 8px 0 0; padding: 8px 10px; border-radius: 10px; font-size: 0.8rem;
    background: var(--danger-soft); color: #a1281f; border: 1px solid #f0b9ac;
  }
  .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .filters select {
    width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #fbfcfe;
    padding: 8px 10px; font-size: 0.85rem; color: var(--text);
  }
  .item-card {
    background: var(--soft); border: 1px solid var(--line); border-radius: 12px;
    padding: 11px; margin-bottom: 9px; border-left: 4px solid var(--line);
  }
  .item-card.risk-danger { border-left-color: var(--danger); }
  .item-card.risk-warn { border-left-color: var(--warn); }
  .item-card.risk-good { border-left-color: var(--good); }
  .item-card.risk-none { border-left-color: var(--muted); }
  .item-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .item-name { font-weight: 700; font-size: 0.92rem; word-break: break-word; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
  .chip {
    display: inline-block; border-radius: 999px; padding: 2px 8px; font-size: 0.68rem;
    background: #fff; border: 1px solid var(--line); color: var(--muted);
  }
  .chip.risk-danger { color: var(--danger); border-color: var(--danger); background: var(--danger-soft); font-weight: 700; }
  .chip.risk-warn { color: var(--warn); border-color: var(--warn); background: var(--warn-soft); font-weight: 700; }
  .chip.risk-good { color: var(--good); border-color: var(--good); background: var(--good-soft); }
  .chip.risk-none { color: var(--muted); }
  .chip.prio-高 { color: var(--danger); border-color: #f0b9ac; }
  .chip.prio-中 { color: var(--warn); border-color: #e7cf96; }
  .chip.prio-低 { color: var(--muted); }
  .stock-line { font-size: 0.8rem; color: var(--text); margin: 3px 0; }
  .stock-line b { color: var(--accent); }
  .forecast-note { font-size: 0.74rem; color: var(--muted); margin-top: 3px; }
  .item-memo { font-size: 0.78rem; color: var(--muted); margin: 4px 0; white-space: pre-wrap; word-break: break-word; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .mini-btn {
    min-height: 38px; padding: 4px 10px; border-radius: 9px; font-size: 0.76rem; font-weight: 600;
    border: 1px solid var(--line); background: #fff; color: var(--text);
  }
  .mini-btn.use { color: var(--danger); border-color: #f0b9ac; }
  .mini-btn.add { color: var(--good); border-color: #a9ddbf; }
  .empty-note { color: var(--muted); font-size: 0.82rem; padding: 8px 2px; }
  .ship-card {
    background: var(--soft); border: 1px solid var(--line); border-radius: 11px;
    padding: 10px; margin-bottom: 8px;
  }
  .ship-card.due { border-color: var(--accent); background: var(--accent-soft); }
  .ship-main { font-size: 0.84rem; }
  .ship-main b { color: var(--accent); }
  .ship-meta { font-size: 0.72rem; color: var(--muted); }
  .log-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 5px; }
  .log-list li {
    background: var(--soft); border-radius: 8px; padding: 6px 9px; font-size: 0.75rem; color: var(--muted);
  }
  .log-list li b { color: var(--text); }
  .log-list li.t-danger { color: #a1281f; }
  .log-list li.t-event { color: var(--accent); }
  .log-list li.t-add { color: var(--good); }
  .agg-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--soft); border-radius: 9px; padding: 7px 10px; margin-bottom: 6px; font-size: 0.82rem;
  }
  .agg-row b { color: var(--accent); }
  .agg-row.danger b { color: var(--danger); }
  .agg-row.warn b { color: var(--warn); }
  .edit-note { font-size: 0.8rem; color: var(--warn); margin-bottom: 8px; font-weight: 700; }
  .row-actions { display: flex; gap: 6px; }
  .inline-form { margin-top: 8px; padding: 10px; border: 1px dashed var(--line); border-radius: 10px; background: var(--soft); }
  .toast {
    margin: 8px 0; padding: 8px 11px; border-radius: 10px; font-size: 0.8rem;
    background: var(--good-soft); color: #1c7a48; border: 1px solid #a9ddbf;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>補給線フォーキャスター</h1>
    <div class="lead">在庫・消費・補充を管理し、数日先の欠品を予測する補給線ツール</div>
    <div id="dayBar" class="day-bar"></div>
  </header>

  <div id="banner" class="banner" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <nav class="tabs" id="tabBar">
    <button type="button" class="tab-btn" data-tab="dashboard">状況</button>
    <button type="button" class="tab-btn" data-tab="items">品目</button>
    <button type="button" class="tab-btn" data-tab="ships">補充予定</button>
    <button type="button" class="tab-btn" data-tab="history">履歴</button>
    <button type="button" class="tab-btn" data-tab="settings">設定</button>
  </nav>

  <main id="tabContent"></main>
</div>

<script>
(function () {
  'use strict';

  var KEY = 'supplyLineForecaster:v1';
  var CATEGORIES = ['食料', '燃料', '医療', '弾薬', '資材', 'その他'];
  var UNITS = ['個', 'kg', 'L', '箱', 'セット', '本'];
  var PRIORITIES = ['高', '中', '低'];
  var RISK_LABEL = { danger: '危険', warn: '注意', good: '安全', none: '消費なし' };
  var HISTORY_MAX = 120;
  var HISTORY_SHOW = 40;
  var DAY_MAX = 999999;

  var S = null;
  var els = {};
  var activeTab = 'dashboard';
  var editingItemId = null;
  var busy = false;
  var toastTimer = null;

  function isObj(v) { return v !== null && typeof v === 'object' && !Array.isArray(v); }
  function clampN(v, a, b) { return Math.min(b, Math.max(a, v)); }
  function toNum(v, f) { var n = Number(v); return Number.isFinite(n) ? n : f; }
  function toInt(v, f) { var n = Number(v); return Number.isFinite(n) ? Math.floor(n) : f; }
  function el(tag, cls, text) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined && text !== null) e.textContent = text;
    return e;
  }
  function genId() {
    if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID();
    return 'x-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
  }
  function fmtNum(n) {
    var r = Math.round(n * 100) / 100;
    return (Math.abs(r - Math.round(r)) < 1e-9) ? String(Math.round(r)) : String(r);
  }
  function nowLabel() {
    var d = new Date();
    function p(n) { return n < 10 ? '0' + n : String(n); }
    return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
  }

  function showBanner(msg) { els.banner.textContent = msg; els.banner.hidden = false; }
  function hideBanner() { els.banner.hidden = true; }
  function showToast(msg) {
    els.toast.textContent = msg; els.toast.hidden = false;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { els.toast.hidden = true; }, 2600);
  }

  // ---------- state ----------

  function freshState() {
    return {
      day: 1,
      forecastDays: 7,
      items: [],
      shipments: [],
      history: [],
      stats: { stockouts: 0, events: 0 },
      seed: false
    };
  }

  function sampleState() {
    var s = freshState();
    s.seed = true;
    function mkItem(name, cat, stock, unit, use, safety, prio, memo) {
      return {
        id: genId(), name: name, category: cat, stock: stock, unit: unit,
        dailyUse: use, safetyStock: safety, priority: prio, memo: memo || '',
        createdAt: nowLabel(), updatedAt: nowLabel()
      };
    }
    s.items.push(mkItem('携行食', '食料', 42, '食', 6, 18, '高', '前線分隊向け'));
    s.items.push(mkItem('飲料水', '食料', 30, 'L', 8, 20, '高', ''));
    s.items.push(mkItem('軽油', '燃料', 120, 'L', 15, 40, '中', '発電機用'));
    s.items.push(mkItem('包帯', '医療', 24, '箱', 1, 6, '中', ''));
    s.items.push(mkItem('予備電池', '資材', 16, '本', 0, 8, '低', '在庫のみ管理'));
    var waterId = s.items[1].id;
    s.shipments.push({ id: genId(), itemId: waterId, etaDay: 3, quantity: 40, memo: '定期補給', applied: false });
    var fuelId = s.items[2].id;
    s.shipments.push({ id: genId(), itemId: fuelId, etaDay: 5, quantity: 100, memo: '', applied: false });
    return s;
  }

  function sanitizeItem(raw) {
    if (!isObj(raw)) return null;
    if (typeof raw.name !== 'string' || !raw.name.trim()) return null;
    return {
      id: typeof raw.id === 'string' && raw.id ? raw.id.slice(0, 60) : genId(),
      name: raw.name.trim().slice(0, 40),
      category: CATEGORIES.indexOf(raw.category) !== -1 ? raw.category : CATEGORIES[CATEGORIES.length - 1],
      stock: clampN(toNum(raw.stock, 0), 0, 9999999),
      unit: UNITS.indexOf(raw.unit) !== -1 ? raw.unit : UNITS[0],
      dailyUse: clampN(toNum(raw.dailyUse, 0), 0, 9999999),
      safetyStock: clampN(toNum(raw.safetyStock, 0), 0, 9999999),
      priority: PRIORITIES.indexOf(raw.priority) !== -1 ? raw.priority : '中',
      memo: typeof raw.memo === 'string' ? raw.memo.slice(0, 120) : '',
      createdAt: typeof raw.createdAt === 'string' ? raw.createdAt.slice(0, 30) : nowLabel(),
      updatedAt: typeof raw.updatedAt === 'string' ? raw.updatedAt.slice(0, 30) : nowLabel()
    };
  }

  function sanitizeShipment(raw, validIds) {
    if (!isObj(raw)) return null;
    if (typeof raw.itemId !== 'string' || validIds.indexOf(raw.itemId) === -1) return null;
    return {
      id: typeof raw.id === 'string' && raw.id ? raw.id.slice(0, 60) : genId(),
      itemId: raw.itemId,
      etaDay: clampN(toInt(raw.etaDay, 1), 1, DAY_MAX),
      quantity: clampN(toNum(raw.quantity, 0), 0, 9999999),
      memo: typeof raw.memo === 'string' ? raw.memo.slice(0, 120) : '',
      applied: raw.applied === true
    };
  }

  function loadState() {
    var raw;
    try { raw = window.localStorage.getItem(KEY); }
    catch (e) {
      showBanner('この端末では保存機能を利用できません。この画面を閉じると記録は失われます。');
      S = sampleState(); return;
    }
    if (!raw) { S = sampleState(); return; }
    try {
      var p = JSON.parse(raw);
      if (!isObj(p)) throw new Error('shape');
      var f = freshState();
      f.day = clampN(toInt(p.day, 1), 1, DAY_MAX);
      f.forecastDays = clampN(toInt(p.forecastDays, 7), 1, 60);
      (Array.isArray(p.items) ? p.items : []).forEach(function (r) {
        var it = sanitizeItem(r);
        if (it && !f.items.some(function (x) { return x.id === it.id; })) f.items.push(it);
      });
      var validIds = f.items.map(function (x) { return x.id; });
      (Array.isArray(p.shipments) ? p.shipments : []).forEach(function (r) {
        var sh = sanitizeShipment(r, validIds);
        if (sh && !f.shipments.some(function (x) { return x.id === sh.id; })) f.shipments.push(sh);
      });
      (Array.isArray(p.history) ? p.history : []).forEach(function (r) {
        if (isObj(r) && typeof r.text === 'string' && f.history.length < HISTORY_MAX) {
          f.history.push({
            day: clampN(toInt(r.day, 1), 1, DAY_MAX),
            type: typeof r.type === 'string' ? r.type.slice(0, 16) : 'info',
            text: r.text.slice(0, 160),
            at: typeof r.at === 'string' ? r.at.slice(0, 20) : ''
          });
        }
      });
      if (isObj(p.stats)) {
        f.stats.stockouts = clampN(toInt(p.stats.stockouts, 0), 0, 9999999);
        f.stats.events = clampN(toInt(p.stats.events, 0), 0, 9999999);
      }
      f.seed = p.seed === true;
      S = f;
    } catch (e) {
      showBanner('保存データを読み込めなかったため、初期状態から始めます。');
      S = freshState();
    }
  }

  function persist() {
    try { window.localStorage.setItem(KEY, JSON.stringify(S)); }
    catch (e) { showBanner('保存できませんでした。この画面を閉じると変更は失われますが、操作は継続できます。'); }
  }

  // ---------- domain ----------

  function pushHistory(type, text) {
    S.history.unshift({ day: S.day, type: type, text: text, at: nowLabel() });
    if (S.history.length > HISTORY_MAX) S.history.length = HISTORY_MAX;
  }

  function itemById(id) { return S.items.find(function (x) { return x.id === id; }); }

  function pendingShipmentsFor(itemId) {
    return S.shipments.filter(function (sh) { return sh.itemId === itemId && !sh.applied; });
  }

  // 予測: 現在庫から日次消費を引き、途中の補充予定（未反映・ETA<=day+n）を加味して
  // 予測期間内に安全在庫割れ／在庫0が起きるかを判定する
  function forecast(item) {
    if (item.dailyUse <= 0) {
      return { risk: 'none', stockoutDay: null, safetyDay: null, endStock: item.stock };
    }
    var n = S.forecastDays;
    var stock = item.stock;
    var pend = pendingShipmentsFor(item.id);
    var risk = 'good', stockoutDay = null, safetyDay = null;
    for (var d = 1; d <= n; d++) {
      var arriveDay = S.day + d;
      pend.forEach(function (sh) {
        if (sh.etaDay === arriveDay) stock += sh.quantity;
      });
      stock -= item.dailyUse;
      if (stock < 0) stock = 0;
      if (stock <= 0 && stockoutDay === null) { stockoutDay = d; risk = 'danger'; }
      if (stock < item.safetyStock && safetyDay === null) { safetyDay = d; if (risk !== 'danger') risk = 'warn'; }
    }
    // 現時点で既に安全在庫割れ
    if (item.stock < item.safetyStock && risk === 'good') { risk = 'warn'; if (safetyDay === null) safetyDay = 0; }
    if (item.stock <= 0 && risk !== 'danger') { risk = 'danger'; if (stockoutDay === null) stockoutDay = 0; }
    return { risk: risk, stockoutDay: stockoutDay, safetyDay: safetyDay, endStock: stock };
  }

  function riskRank(r) { return r === 'danger' ? 0 : r === 'warn' ? 1 : r === 'good' ? 2 : 3; }

  // ---------- actions ----------

  function nextDay() {
    if (busy) return;
    busy = true;
    hideBanner();
    S.day++;
    // 補充予定でETAが到達したものを自動適用せず、日次消費のみ実施（到着分はユーザー操作で反映）
    var consumed = 0, stockouts = [];
    S.items.forEach(function (it) {
      if (it.dailyUse <= 0) return;
      var before = it.stock;
      it.stock = Math.max(0, it.stock - it.dailyUse);
      var used = before - it.stock;
      consumed += used;
      if (it.stock <= 0 && before > 0) {
        stockouts.push(it.name);
        S.stats.stockouts++;
      }
      it.updatedAt = nowLabel();
    });
    pushHistory('day', S.day + '日目に進行。合計 ' + fmtNum(consumed) + ' 消費' + (stockouts.length ? '。欠品: ' + stockouts.join('、') : ''));
    stockouts.forEach(function (nm) { pushHistory('stockout', '「' + nm + '」が在庫切れになった'); });
    var due = S.shipments.filter(function (sh) { return !sh.applied && sh.etaDay <= S.day; }).length;
    persist();
    busy = false;
    render();
    showToast(S.day + '日目へ進みました' + (due ? '（到着した補充予定が ' + due + ' 件あります）' : ''));
  }

  function applyShipment(id) {
    var sh = S.shipments.find(function (x) { return x.id === id; });
    if (!sh || sh.applied) return;
    var it = itemById(sh.itemId);
    if (!it) { showBanner('対象品目が見つかりません。'); return; }
    it.stock = clampN(it.stock + sh.quantity, 0, 9999999);
    it.updatedAt = nowLabel();
    sh.applied = true;
    pushHistory('shipment', '補充予定を反映: 「' + it.name + '」に +' + fmtNum(sh.quantity) + fmtUnit(it) + '（在庫 ' + fmtNum(it.stock) + '）');
    persist();
    render();
    showToast('補充予定を在庫へ反映しました');
  }

  function fmtUnit(it) { return it && it.unit ? it.unit : ''; }

  function manualAdjust(itemId, delta, memo) {
    var it = itemById(itemId);
    if (!it) return;
    var before = it.stock;
    it.stock = clampN(it.stock + delta, 0, 9999999);
    var actual = it.stock - before;
    it.updatedAt = nowLabel();
    var type = delta < 0 ? 'use' : 'add';
    var verb = delta < 0 ? '消費' : '補充';
    pushHistory(type, '手動' + verb + ': 「' + it.name + '」' + (actual >= 0 ? '+' : '') + fmtNum(actual) + fmtUnit(it) + '（在庫 ' + fmtNum(it.stock) + '）' + (memo ? ' / ' + memo : ''));
    if (delta < 0 && it.stock <= 0 && before > 0) { S.stats.stockouts++; pushHistory('stockout', '「' + it.name + '」が在庫切れになった'); }
    persist();
    render();
  }

  // ---------- events ----------

  var EVENT_DEFS = [
    { key: 'demand', label: '需要増' },
    { key: 'damage', label: '破損/廃棄' },
    { key: 'early', label: '早着' },
    { key: 'delay', label: '遅延' },
    { key: 'supply', label: '臨時支給' }
  ];

  function triggerEvent() {
    if (busy) return;
    if (S.items.length === 0) { showBanner('品目が登録されていません。まず品目を追加してください。'); return; }
    busy = true;
    hideBanner();
    var pool = EVENT_DEFS.slice();
    // 補充予定が無ければ早着/遅延は候補から外す
    var hasPending = S.shipments.some(function (sh) { return !sh.applied; });
    if (!hasPending) pool = pool.filter(function (e) { return e.key !== 'early' && e.key !== 'delay'; });
    var ev = pool[Math.floor(Math.random() * pool.length)];
    var msg = '';
    if (ev.key === 'demand') {
      var cat = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
      var targets = S.items.filter(function (it) { return it.category === cat && it.dailyUse > 0; });
      if (targets.length === 0) {
        targets = S.items.filter(function (it) { return it.dailyUse > 0; });
        cat = targets.length ? targets[0].category : cat;
      }
      if (targets.length === 0) { msg = '需要増の兆候があったが、消費のある品目がなく影響は出なかった'; }
      else {
        var extra = 0;
        targets.forEach(function (it) {
          var add = Math.max(1, Math.round(it.dailyUse * (0.3 + Math.random() * 0.5)));
          var before = it.stock;
          it.stock = Math.max(0, it.stock - add);
          extra += before - it.stock;
          it.updatedAt = nowLabel();
          if (it.stock <= 0 && before > 0) { S.stats.stockouts++; pushHistory('stockout', '「' + it.name + '」が在庫切れになった'); }
        });
        msg = '需要増（' + cat + '）: 該当' + targets.length + '品目から計 ' + fmtNum(extra) + ' を追加消費';
      }
    } else if (ev.key === 'damage') {
      var it2 = S.items[Math.floor(Math.random() * S.items.length)];
      var loss = Math.max(1, Math.round(it2.stock * (0.1 + Math.random() * 0.3)));
      loss = Math.min(loss, it2.stock);
      var before2 = it2.stock;
      it2.stock = Math.max(0, it2.stock - loss);
      it2.updatedAt = nowLabel();
      if (it2.stock <= 0 && before2 > 0) { S.stats.stockouts++; pushHistory('stockout', '「' + it2.name + '」が在庫切れになった'); }
      msg = '破損/廃棄: 「' + it2.name + '」の在庫を ' + fmtNum(loss) + fmtUnit(it2) + ' 失った（在庫 ' + fmtNum(it2.stock) + '）';
    } else if (ev.key === 'early') {
      var cand = S.shipments.filter(function (sh) { return !sh.applied; });
      var sh1 = cand[Math.floor(Math.random() * cand.length)];
      sh1.etaDay = Math.max(1, sh1.etaDay - 1);
      var it3 = itemById(sh1.itemId);
      msg = '早着: 「' + (it3 ? it3.name : '?') + '」の補充予定が1日早まり ' + sh1.etaDay + '日目着に';
    } else if (ev.key === 'delay') {
      var cand2 = S.shipments.filter(function (sh) { return !sh.applied; });
      var sh2 = cand2[Math.floor(Math.random() * cand2.length)];
      var dd = 1 + Math.floor(Math.random() * 2);
      sh2.etaDay = clampN(sh2.etaDay + dd, 1, DAY_MAX);
      var it4 = itemById(sh2.itemId);
      msg = '遅延: 「' + (it4 ? it4.name : '?') + '」の補充予定が ' + dd + '日遅れ ' + sh2.etaDay + '日目着に';
    } else {
      var it5 = S.items[Math.floor(Math.random() * S.items.length)];
      var gain = Math.max(1, Math.round((it5.safetyStock || 5) * (0.3 + Math.random() * 0.7)));
      it5.stock = clampN(it5.stock + gain, 0, 9999999);
      it5.updatedAt = nowLabel();
      msg = '臨時支給: 「' + it5.name + '」に +' + fmtNum(gain) + fmtUnit(it5) + '（在庫 ' + fmtNum(it5.stock) + '）';
    }
    S.stats.events++;
    pushHistory('event', '突発イベント｜' + msg);
    persist();
    busy = false;
    render();
    showToast('突発イベント: ' + ev.label);
  }

  // ---------- item form ----------

  function readItemForm() {
    return {
      name: els.inName.value.trim(),

      stock: els.inStock.value,

    };

  function validateNumberField(v) {
    if (v === '' || v === null || v === undefined) return { ok: true, val: 0 };
    var n = Number(v);
    if (!Number.isFinite(n) || n < 0) return { ok: false };
    return { ok: true, val: n };
  }

  function submitItem() {
    hideBanner();
    var f = readItemForm();
    if (!f.name) { showFormError('品目名を入力してください。'); return; }
    var st = validateNumberField(f.stock);
    var us = validateNumberField(f.dailyUse);
    var sa = validateNumberField(f.safetyStock);
    if (!st.ok) { showFormError('現在庫は0以上の数値で入力してください。'); return; }
    if (!us.ok) { showFormError('1日消費量は0以上の数値で入力してください。'); return; }
    if (!sa.ok) { showFormError('安全在庫は0以上の数値で入力してください。'); return; }
    clearFormError();
    if (editingItemId) {
      var it = itemById(editingItemId);
      if (it) {
        it.name = f.name.slice(0, 40);
        it.category = f.category;
        it.stock = clampN(st.val, 0, 9999999);
        it.unit = f.unit;
        it.dailyUse = clampN(us.val, 0, 9999999);
        it.safetyStock = clampN(sa.val, 0, 9999999);
        it.priority = f.priority;
        it.memo = f.memo;
        it.updatedAt = nowLabel();
        pushHistory('edit', '「' + it.name + '」の内容を編集した');
      }
      stopEditItem();
    } else {
      S.items.unshift({
        id: genId(), name: f.name.slice(0, 40), category: f.category,
        stock: clampN(st.val, 0, 9999999), unit: f.unit,
        dailyUse: clampN(us.val, 0, 9999999), safetyStock: clampN(sa.val, 0, 9999999),
        priority: f.priority, memo: f.memo,
        createdAt: nowLabel(), updatedAt: nowLabel()
      });
      pushHistory('add', '品目「' + f.name.slice(0, 40) + '」を登録した');
      clearItemForm();
      showToast('品目を登録しました');
    }
    persist();
    render();
  }

  function clearFormError() { els.formError.hidden = true; }

  function clearItemForm() {
    els.inName.value = '';
    els.inCategory.value = CATEGORIES[0];

    els.inUnit.value = UNITS[0];

  function stopEditItem() {

    }
  }

  function deleteItem(id) {
    var idx = S.items.findIndex(function (x) { return x.id === id; });
    if (idx === -1) return;
    if (!window.confirm('「' + S.items[idx].name + '」と、その補充予定を削除します。よろしいですか？')) return;
    var nm = S.items[idx].name;
    S.items.splice(idx, 1);
    S.shipments = S.shipments.filter(function (sh) { return sh.itemId !== id; });
    if (editingItemId === id) stopEditItem();
    pushHistory('delete', '品目「' + nm + '」を削除した');
    persist();
    render();
  }

  // ---------- shipment form ----------

  function submitShipment() {
    hideBanner();
    if (S.items.length === 0) { showShipError('先に品目を登録してください。'); return; }
    var itemId = els.shipItem.value;
    if (!itemById(itemId)) { showShipError('対象品目を選択してください。'); return; }
    var etaRaw = els.shipEta.value;
    var eta = Number(etaRaw);
    if (etaRaw === '' || !Number.isFinite(eta) || Math.floor(eta) < 1) { showShipError('到着予定日は1以上の日数で入力してください。'); return; }
    var qtyRaw = els.shipQty.value;
    var qty = Number(qtyRaw);
    if (qtyRaw === '' || !Number.isFinite(qty) || qty < 0) { showShipError('数量は0以上の数値で入力してください。'); return; }
    clearShipError();
    var it = itemById(itemId);
    S.shipments.push({
      id: genId(), itemId: itemId, etaDay: clampN(Math.floor(eta), 1, DAY_MAX),
      quantity: clampN(qty, 0, 9999999), memo: els.shipMemo.value.slice(0, 120), applied: false
    });
    pushHistory('plan', '補充予定を追加: 「' + it.name + '」 ' + fmtNum(qty) + fmtUnit(it) + ' → ' + Math.floor(eta) + '日目着');
    els.shipQty.value = '';
    els.shipMemo.value = '';
    persist();
    render();
    showToast('補充予定を追加しました');
  }

  function showShipError(msg) { els.shipError.textContent = msg; els.shipError.hidden = false; }
  function clearShipError() { els.shipError.hidden = true; }

  function deleteShipment(id) {
    var idx = S.shipments.findIndex(function (x) { return x.id === id; });
    if (idx === -1) return;
    var sh = S.shipments[idx];
    var it = itemById(sh.itemId);
    S.shipments.splice(idx, 1);
    pushHistory('plan', '補充予定を削除' + (it ? '（' + it.name + '）' : ''));
    persist();
    render();
  }

  function clearHistory() {
    if (!window.confirm('履歴をすべて削除します。品目や在庫は残ります。よろしいですか？')) return;
    S.history = [];
    persist();
    render();
    showToast('履歴を削除しました');
  }

  function resetAll() {
    if (!window.confirm('すべての品目・補充予定・履歴・日数を削除して最初からやり直します。よろしいですか？')) return;
    try { window.localStorage.removeItem(KEY); } catch (e) { /* 続行 */ }
    S = freshState();
    stopEditItem();
    activeTab = 'dashboard';
    persist();
    render();

  // ---------- render ----------

  function riskChip(fc) {
    var span = el('span', 'chip risk-' + fc.risk, RISK_LABEL[fc.risk]);
    return span;
  }

  function forecastText(item, fc) {
    if (fc.risk === 'none') return '消費設定なし（在庫のみ管理）';
    if (fc.risk === 'danger') {
      if (fc.stockoutDay === 0) return '現在すでに在庫切れ';
      return '約' + fc.stockoutDay + '日後に在庫0の見込み';
    }
    if (fc.risk === 'warn') {
      if (fc.safetyDay === 0) return '現在すでに安全在庫を下回っている';
      return '約' + fc.safetyDay + '日後に安全在庫を下回る見込み';
    }
    return S.forecastDays + '日間は安全在庫を維持（残 ' + fmtNum(fc.endStock) + fmtUnit(item) + '）';
  }

  function renderDayBar() {
    els.dayBar.innerHTML = '';
    var pairs = [['運用日数', S.day + '日目'], ['予測範囲', S.forecastDays + '日'], ['品目', S.items.length + '件']];
    pairs.forEach(function (p) {
      var c = el('span', 'day-chip');
      c.appendChild(document.createTextNode(p[0] + ' '));
      c.appendChild(el('b', null, String(p[1])));
      els.dayBar.appendChild(c);
    });
  }

  function computeAll() {
    var list = S.items.map(function (it) { return { item: it, fc: forecast(it) }; });
    list.sort(function (a, b) {
      var r = riskRank(a.fc.risk) - riskRank(b.fc.risk);
      if (r !== 0) return r;
      return PRIORITIES.indexOf(a.item.priority) - PRIORITIES.indexOf(b.item.priority);
    });
    return list;
  }

  function itemCard(entry, opts) {
    var it = entry.item, fc = entry.fc;
    var c = el('div', 'item-card risk-' + fc.risk);

      c.appendChild(el('div', 'forecast-note', '次の補充予定: ' + next.etaDay + '日目に +' + fmtNum(next.quantity) + it.unit + (pend.length > 1 ? '（他' + (pend.length - 1) + '件）' : '')));

    listCard.appendChild(el('h2', null, '品目一覧（' + S.items.length + '件）'));
    if (S.items.length === 0) {
      listCard.appendChild(el('div', 'empty-note', 'まだ品目がありません。上のフォームから登録してください。'));
    } else {
      computeAll().forEach(function (e) { listCard.appendChild(itemCard(e, { manage: true })); });
    }
    root.appendChild(listCard);

    if (editingItemId) {
      var it = itemById(editingItemId);
      if (it) {
        els.inName.value = it.name; els.inCategory.value = it.category;
        els.inStock.value = fmtNum(it.stock); els.inUnit.value = it.unit;
        els.inUse.value = fmtNum(it.dailyUse); els.inSafety.value = fmtNum(it.safetyStock);
        els.inPriority.value = it.priority; els.inMemo.value = it.memo;
        els.formTitle.textContent = '品目を編集';
        els.editNote.textContent = '編集中: ' + it.name; els.editNote.hidden = false;
      }
    }
  }

  function mkInput(parent, id, label, type, attrs) {
    var f = el('div', 'field');
    f.appendChild(el('label', null, label));
    var inp = el('input');
    inp.type = type;
    if (attrs) { Object.keys(attrs).forEach(function (k) { inp[k] = attrs[k]; }); }
    f.appendChild(inp);
    parent.appendChild(f);
    return inp;
  }
  function mkSelect(parent, id, label, options, def) {
    var f = el('div', 'field');
    f.appendChild(el('label', null, label));
    var sel = el('select');
    options.forEach(function (o) { sel.appendChild(new Option(o, o)); });
    if (def) sel.value = def;
    f.appendChild(sel);
    parent.appendChild(f);
    return sel;
  }
  function mkTextarea(parent, id, label, maxLen) {
    var f = el('div', 'field');
    f.appendChild(el('label', null, label));
    var ta = el('textarea');
    ta.maxLength = maxLen;
    f.appendChild(ta);
    parent.appendChild(f);
    return ta;
  }

  function renderShips(root) {
    var form = el('div', 'card');
    form.appendChild(el('h2', null, '補充予定を追加'));
    if (S.items.length === 0) {
      form.appendChild(el('div', 'empty-note', '先に品目を登録してください。'));
      root.appendChild(form);
      return;
    }
    var fSel = el('div', 'field');
    fSel.appendChild(el('label', null, '対象品目'));
    var sel = el('select');
    S.items.forEach(function (it) { sel.appendChild(new Option(it.name + '（' + it.category + '）', it.id)); });
    fSel.appendChild(sel); form.appendChild(fSel);
    els.shipItem = sel;
    var row = el('div', 'field-row');
    els.shipEta = mkInput(row, 'shipEta', '到着予定日（何日目）', 'number', { min: '1', step: '1', placeholder: '例: ' + (S.day + 3) });
    els.shipQty = mkInput(row, 'shipQty', '数量', 'number', { min: '0', step: 'any', placeholder: '例: 40' });
    form.appendChild(row);
    els.shipMemo = mkInput(form, 'shipMemo', 'メモ（任意）', 'text', { maxLength: 60 });
    var shipError = el('div', 'form-error'); shipError.hidden = true; els.shipError = shipError;
    form.appendChild(shipError);
    form.appendChild(el('div', 'forecast-note', '現在は ' + S.day + '日目です。到着予定日は「何日目に届くか」を入力してください。'));
    var addBtn = el('button', 'primary-btn', '補充予定を追加');
    addBtn.type = 'button'; addBtn.dataset.action = 'submit-ship'; addBtn.style.marginTop = '9px';
    form.appendChild(addBtn);
    root.appendChild(form);

    var pendingCard = el('div', 'card');
    pendingCard.appendChild(el('h2', null, '未反映の補充予定'));
    var pending = S.shipments.filter(function (sh) { return !sh.applied; })
      .sort(function (a, b) { return a.etaDay - b.etaDay; });
    if (pending.length === 0) {
      pendingCard.appendChild(el('div', 'empty-note', '未反映の補充予定はありません。'));
    } else {
      pending.forEach(function (sh) {
        var it = itemById(sh.itemId);
        var due = sh.etaDay <= S.day;
        var c = el('div', 'ship-card' + (due ? ' due' : ''));
        var main = el('div', 'ship-main');
        main.appendChild(document.createTextNode((it ? it.name : '?') + ' に '));
        main.appendChild(el('b', null, '+' + fmtNum(sh.quantity) + (it ? it.unit : '')));
        main.appendChild(document.createTextNode(' / ' + sh.etaDay + '日目着' + (due ? '（到着済み）' : '（あと' + (sh.etaDay - S.day) + '日）')));
        c.appendChild(main);
        if (sh.memo) c.appendChild(el('div', 'ship-meta', sh.memo));
        var row2 = el('div', 'btn-row');
        var applyBtn = el('button', 'mini-btn add', '在庫へ反映');
        applyBtn.type = 'button'; applyBtn.dataset.action = 'apply-ship'; applyBtn.dataset.id = sh.id;
        if (!due) applyBtn.disabled = true;
        var delBtn = el('button', 'mini-btn', '削除');
        delBtn.type = 'button'; delBtn.dataset.action = 'delete-ship'; delBtn.dataset.id = sh.id;
        row2.appendChild(applyBtn); row2.appendChild(delBtn);
        c.appendChild(row2);
        if (!due) c.appendChild(el('div', 'ship-meta', '到着予定日になると反映できます。'));
        pendingCard.appendChild(c);
      });
    }
    root.appendChild(pendingCard);

    var doneCard = el('div', 'card');
    doneCard.appendChild(el('h2', null, '反映済みの補充予定'));
    var done = S.shipments.filter(function (sh) { return sh.applied; });
    if (done.length === 0) doneCard.appendChild(el('div', 'empty-note', 'まだありません。'));
    else {
      done.slice(-10).reverse().forEach(function (sh) {
        var it = itemById(sh.itemId);
        var c = el('div', 'ship-card');
        c.appendChild(el('div', 'ship-main', (it ? it.name : '?') + ' +' + fmtNum(sh.quantity) + (it ? it.unit : '') + '（' + sh.etaDay + '日目着・反映済み）'));
        doneCard.appendChild(c);
      });
    }
    root.appendChild(doneCard);
  }

  var HIST_TYPE = {
    day: '', stockout: 't-danger', event: 't-event', shipment: 't-add',
    use: 't-danger', add: 't-add', plan: '', edit: '', add_item: 't-add', delete: 't-danger'
  };

  function renderHistory(root) {
    var card = el('div', 'card');
    card.appendChild(el('h2', null, '履歴（最新 ' + Math.min(S.history.length, HISTORY_SHOW) + ' / ' + S.history.length + '件）'));
    if (S.history.length === 0) {
      card.appendChild(el('div', 'empty-note', 'まだ履歴がありません。'));
    } else {
      var ul = el('ul', 'log-list');
      S.history.slice(0, HISTORY_SHOW).forEach(function (h) {
        var li = el('li', HIST_TYPE[h.type] || '');
        li.appendChild(el('b', null, h.day + '日目 '));
        li.appendChild(document.createTextNode(h.text + (h.at ? '（' + h.at + '）' : '')));
        ul.appendChild(li);
      });
      card.appendChild(ul);
      if (S.history.length > HISTORY_SHOW) {
        card.appendChild(el('div', 'forecast-note', '直近 ' + HISTORY_SHOW + '件のみ表示しています（保持は最大 ' + HISTORY_MAX + '件）。'));
      }
    }
    root.appendChild(card);
  }

  function renderSettings(root) {
    var fcCard = el('div', 'card');
    fcCard.appendChild(el('h2', null, '予測設定'));
    var f = el('div', 'field');
    f.appendChild(el('label', null, '予測日数（1〜60日）'));
    var inp = el('input');
    inp.type = 'number'; inp.min = '1'; inp.max = '60'; inp.step = '1'; inp.value = String(S.forecastDays);
    inp.dataset.action = 'set-forecast';
    f.appendChild(inp);
    fcCard.appendChild(f);
    fcCard.appendChild(el('div', 'forecast-note', '危険/注意の判定はこの日数の範囲で行われます。'));
    root.appendChild(fcCard);

    var aggCard = el('div', 'card');
    aggCard.appendChild(el('h2', null, '集計'));
    var list = computeAll();
    var danger = list.filter(function (e) { return e.fc.risk === 'danger'; }).length;
    var warn = list.filter(function (e) { return e.fc.risk === 'warn'; }).length;
    var totalStock = S.items.reduce(function (a, it) { return a + it.stock; }, 0);
    var todayUse = S.items.reduce(function (a, it) { return a + it.dailyUse; }, 0);
    var rows = [
      ['登録品目数', S.items.length, ''],
      ['危険品目数', danger, danger ? 'danger' : ''],
      ['注意品目数', warn, warn ? 'warn' : ''],
      ['総在庫数', fmtNum(totalStock), ''],
      ['現在日の日消費合計', fmtNum(todayUse), ''],
      ['累計欠品回数', S.stats.stockouts, S.stats.stockouts ? 'warn' : ''],
      ['累計イベント回数', S.stats.events, '']
    ];
    rows.forEach(function (r) {
      var row = el('div', 'agg-row' + (r[2] ? ' ' + r[2] : ''));
      row.appendChild(el('span', null, r[0]));
      row.appendChild(el('b', null, String(r[1])));
      aggCard.appendChild(row);
    });
    root.appendChild(aggCard);

    var dataCard = el('div', 'card');
    dataCard.appendChild(el('h2', null, 'データ管理'));
    dataCard.appendChild(el('div', 'forecast-note', '保存データはこの端末のブラウザ内（localStorage）にのみ保存されます。'));
    var histBtn = el('button', 'ghost-btn', '履歴のみ削除');
    histBtn.type = 'button'; histBtn.dataset.action = 'clear-history';
    histBtn.style.width = '100%'; histBtn.style.marginTop = '10px';
    dataCard.appendChild(histBtn);
    var resetBtn = el('button', 'danger-btn', 'すべてのデータをリセット');
    resetBtn.type = 'button'; resetBtn.dataset.action = 'reset-all';
    resetBtn.style.marginTop = '8px';
    dataCard.appendChild(resetBtn);
    root.appendChild(dataCard);
  }

  function render() {
    renderDayBar();
    var tabs = els.tabBar.querySelectorAll('.tab-btn');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', tabs[i].dataset.tab === activeTab);
    var root = els.tabContent;
    root.innerHTML = '';
    if (activeTab === 'dashboard') renderDashboard(root);
    else if (activeTab === 'items') renderItems(root);
    else if (activeTab === 'ships') renderShips(root);
    else if (activeTab === 'history') renderHistory(root);
    else if (activeTab === 'settings') renderSettings(root);
  }

  // ---------- events / actions ----------

  function openAdjust(itemId, mode) {
    adjustMode[itemId] = mode;
    var form = els.tabContent.querySelector('[data-adjust-for="' + cssEscape(itemId) + '"]');
    if (form) {
      form.hidden = false;
      var qinput = form.querySelector('[data-adjust-qty]');
      if (qinput) { qinput.value = ''; qinput.focus(); }
    }
  }
  function cssEscape(s) { return String(s).replace(/["\\]/g, '\\$&'); }

  function confirmAdjust(itemId) {
    var form = els.tabContent.querySelector('[data-adjust-for="' + cssEscape(itemId) + '"]');
    if (!form) return;
    var qInput = form.querySelector('[data-adjust-qty]');
    var mInput = form.querySelector('[data-adjust-memo]');
    var raw = qInput ? qInput.value : '';
    var n = Number(raw);
    if (raw === '' || !Number.isFinite(n) || n <= 0) { showBanner('数量は0より大きい数値で入力してください。'); return; }
    var mode = adjustMode[itemId] || 'use';
    manualAdjust(itemId, mode === 'use' ? -n : n, mInput ? mInput.value.trim().slice(0, 60) : '');
  }

  function onAction(e) {
    var t = e.target.closest('[data-action]');
    if (!t) return;
    var id = t.dataset.id;
    switch (t.dataset.action) {
      case 'next-day': nextDay(); break;
      case 'trigger-event': triggerEvent(); break;
      case 'submit-item': submitItem(); break;
      case 'cancel-edit': stopEditItem(); render(); break;
      case 'edit-item': startEditItem(id); break;
      case 'delete-item': deleteItem(id); break;
      case 'quick-use': openAdjust(id, 'use'); break;
      case 'quick-add': openAdjust(id, 'add'); break;
      case 'adjust-confirm': confirmAdjust(id); break;
      case 'adjust-cancel':
        var form = els.tabContent.querySelector('[data-adjust-for="' + cssEscape(id) + '"]');
        if (form) form.hidden = true;
        break;
      case 'submit-ship': submitShipment(); break;
      case 'apply-ship': applyShipment(id); break;
      case 'delete-ship': deleteShipment(id); break;
      case 'clear-history': clearHistory(); break;
      case 'reset-all': resetAll(); break;
    }
  }

  function onInput(e) {
    var t = e.target;
    if (t.dataset && t.dataset.action === 'set-forecast') {
      var n = Number(t.value);
      if (Number.isFinite(n)) {
        S.forecastDays = clampN(Math.floor(n), 1, 60);
        persist();
        // 予測日数だけ変わっても入力欄フォーカスを維持したいので部分再描画
        renderDayBar();
        // ダッシュボード等は次回タブ表示時に反映（設定タブ内の集計は即時反映のため再描画）
        var root = els.tabContent;
        // 集計値のみ更新するため設定タブを描き直す
        var focusVal = t.value;
        render();
        var again = els.tabContent.querySelector('[data-action="set-forecast"]');
        if (again) { again.value = focusVal; }
      }
    }
  }

  // ---------- init ----------

  function init() {
    els.banner = document.getElementById('banner');
    els.toast = document.getElementById('toast');
    els.dayBar = document.getElementById('dayBar');
    els.tabBar = document.getElementById('tabBar');
    els.tabContent = document.getElementById('tabContent');

    els.tabBar.addEventListener('click', function (e) {
      var b = e.target.closest('.tab-btn');
      if (!b) return;
      if (activeTab === 'items' && editingItemId && b.dataset.tab !== 'items') stopEditItem();
      activeTab = b.dataset.tab;
      hideBanner();
      render();
      window.scrollTo({ top: 0 });
    });
    els.tabContent.addEventListener('click', onAction);
    els.tabContent.addEventListener('change', onInput);

    loadState();
    persist();
    render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
