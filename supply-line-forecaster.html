<!doctype html>
<!--
name: 補給線フォーキャスター
version: 1.1
type: single-html-app
status: stable
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>補給線フォーキャスター</title>
<style>
  :root {
    color-scheme: light;
    --bg: #eef1f6;
    --card: #ffffff;
    --line: #d8dee9;
    --soft: #f4f7fb;
    --text: #232833;
    --muted: #6d7585;
    --accent: #2f6db3;
    --accent-soft: #e6effb;
    --good: #2f9e63;
    --good-soft: #e4f6ec;
    --warn: #c8890c;
    --warn-soft: #fdf3d8;
    --danger: #cf4437;
    --danger-soft: #fce9e7;
    --crit: #8a1f16;
  }
  * { box-sizing: border-box; }
  html, body { touch-action: manipulation; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    line-height: 1.5;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  button { font: inherit; cursor: pointer; }
  button:disabled { opacity: 0.45; cursor: default; }
  input, select { font: inherit; }
  .app { max-width: 560px; margin: 0 auto; padding: 12px 12px 48px; }
  header { text-align: center; margin-bottom: 8px; }
  header h1 { margin: 0 0 2px; font-size: 1.18rem; }
  header .lead { color: var(--muted); font-size: 0.74rem; }
  .top-bar {
    display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin: 8px 0; font-size: 0.72rem;
  }
  .top-chip { background: var(--soft); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; color: var(--muted); }
  .top-chip b { color: var(--accent); }
  .banner { padding: 9px 11px; border-radius: 10px; font-size: 0.82rem; margin: 8px 0; background: var(--warn-soft); color: #8a5b06; border: 1px solid #e7cf96; }
  .toast { margin: 8px 0; padding: 8px 11px; border-radius: 10px; font-size: 0.8rem; background: var(--good-soft); color: #1c7a48; border: 1px solid #a9ddbf; }
  .tabs { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 6px 0; margin-bottom: 8px; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn { flex: 0 0 auto; min-height: 42px; padding: 6px 15px; border-radius: 999px; border: 1px solid var(--line); background: var(--soft); color: var(--muted); font-size: 0.84rem; white-space: nowrap; }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 13px; margin-bottom: 11px; }
  .card h2 { margin: 0 0 10px; font-size: 0.95rem; }
  .card h3 { margin: 12px 0 7px; font-size: 0.8rem; color: var(--muted); }
  .status-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-box { background: var(--soft); border-radius: 11px; padding: 9px 10px; }
  .stat-box .st-name { font-size: 0.72rem; color: var(--muted); }
  .stat-box .st-val { font-size: 1.15rem; font-weight: 800; }
  .bar { height: 8px; background: #e4e8ef; border-radius: 999px; overflow: hidden; margin-top: 5px; border: 1px solid var(--line); }
  .bar > div { height: 100%; }
  .lv-good { color: var(--good); } .fill-good { background: var(--good); }
  .lv-warn { color: var(--warn); } .fill-warn { background: var(--warn); }
  .lv-danger { color: var(--danger); } .fill-danger { background: var(--danger); }
  .lv-crit { color: var(--crit); } .fill-crit { background: var(--crit); }
  .res-card { background: var(--soft); border: 1px solid var(--line); border-radius: 12px; padding: 10px 11px; margin-bottom: 8px; border-left: 4px solid var(--line); }
  .res-card.s-余裕, .res-card.s-安定 { border-left-color: var(--good); }
  .res-card.s-注意 { border-left-color: var(--warn); }
  .res-card.s-危険 { border-left-color: var(--danger); }
  .res-card.s-崩壊寸前, .res-card.s-供給停止 { border-left-color: var(--crit); }
  .res-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .res-name { font-weight: 700; font-size: 0.9rem; }
  .res-state { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); background: #fff; }
  .st-余裕, .st-安定 { color: var(--good); border-color: var(--good); background: var(--good-soft); }
  .st-注意 { color: var(--warn); border-color: var(--warn); background: var(--warn-soft); }
  .st-危険 { color: var(--danger); border-color: var(--danger); background: var(--danger-soft); }
  .st-崩壊寸前, .st-供給停止 { color: #fff; border-color: var(--crit); background: var(--crit); }
  .res-line { font-size: 0.76rem; color: var(--text); margin-top: 4px; }
  .res-line b { color: var(--accent); }
  .res-sub { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
  .ful-bar { height: 7px; background: #e4e8ef; border-radius: 999px; overflow: hidden; margin-top: 5px; border: 1px solid var(--line); }
  .ful-bar > div { height: 100%; }
  .primary-btn { width: 100%; min-height: 48px; border: 0; border-radius: 12px; background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700; }
  .ghost-btn { min-height: 42px; padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--line); background: transparent; color: var(--muted); }
  .danger-btn { width: 100%; min-height: 46px; border-radius: 11px; font-size: 0.85rem; border: 1px solid #f0b9ac; background: var(--danger-soft); color: var(--danger); }
  .field { margin-bottom: 9px; }
  .field label { display: block; font-size: 0.76rem; color: var(--muted); margin-bottom: 3px; }
  .field select, .field input[type="number"] { width: 100%; border: 1px solid var(--line); border-radius: 10px; background: #fbfcfe; color: var(--text); padding: 9px 11px; font-size: 0.92rem; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .form-error { margin: 8px 0 0; padding: 8px 10px; border-radius: 10px; font-size: 0.8rem; background: var(--danger-soft); color: #a1281f; border: 1px solid #f0b9ac; }
  .order-preview { font-size: 0.78rem; color: var(--text); background: var(--accent-soft); border-radius: 10px; padding: 9px 11px; margin: 8px 0; }
  .order-preview b { color: var(--accent); }
  .ship-card { background: var(--soft); border: 1px solid var(--line); border-radius: 11px; padding: 9px 11px; margin-bottom: 7px; }
  .ship-card.risky { border-color: #e7cf96; }
  .ship-main { font-size: 0.82rem; } .ship-main b { color: var(--accent); }
  .ship-meta { font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
  .empty-note { color: var(--muted); font-size: 0.82rem; padding: 8px 2px; }
  .log-list { list-style: none; margin: 0; padding: 0; display: grid; gap: 5px; }
  .log-list li { background: var(--soft); border-radius: 8px; padding: 6px 9px; font-size: 0.75rem; color: var(--muted); }
  .log-list li b { color: var(--text); }
  .log-list li.t-bad { color: #a1281f; }
  .log-list li.t-good { color: var(--good); }
  .log-list li.t-event { color: var(--accent); }
  .forecast-item { background: var(--soft); border-radius: 9px; padding: 8px 10px; margin-bottom: 6px; font-size: 0.78rem; }
  .forecast-item .fi-danger { color: var(--danger); font-weight: 700; }
  .forecast-item .fi-warn { color: var(--warn); font-weight: 700; }
  .note { color: var(--muted); font-size: 0.76rem; }
  .result-hero { text-align: center; padding: 14px; border-radius: 14px; margin-bottom: 10px; }
  .result-hero.win { background: var(--good-soft); border: 1px solid #a9ddbf; }
  .result-hero.lose { background: var(--danger-soft); border: 1px solid #f0b9ac; }
  .result-hero .rh-title { font-size: 1.3rem; font-weight: 800; }
  .result-hero.win .rh-title { color: #1c7a48; }
  .result-hero.lose .rh-title { color: #a1281f; }
  .agg-row { display: flex; align-items: center; justify-content: space-between; background: var(--soft); border-radius: 9px; padding: 7px 10px; margin-bottom: 6px; font-size: 0.82rem; }
  .agg-row b { color: var(--accent); }
  .rules { font-size: 0.8rem; color: var(--text); }
  .rules li { margin-bottom: 5px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>補給線フォーキャスター</h1>
    <div class="lead">限られた補給ポイントと輸送枠で、30日間 前線の健全度を守る補給バランスゲーム</div>
    <div id="topBar" class="top-bar"></div>
  </header>

  <div id="banner" class="banner" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <nav class="tabs" id="tabBar">
    <button type="button" class="tab-btn" data-tab="status">状況</button>
    <button type="button" class="tab-btn" data-tab="supply">補給</button>
    <button type="button" class="tab-btn" data-tab="history">履歴</button>
    <button type="button" class="tab-btn" data-tab="info">情報</button>
  </nav>

  <main id="tabContent"></main>
</div>

<script>
(function () {
  'use strict';

  var KEY = 'supplyLineForecaster:v2';
  var OLD_KEY = 'supplyLineForecaster:v1';
  var GAME_DAYS = 30;
  var HISTORY_MAX = 140;
  var HISTORY_SHOW = 40;

  // 物資定義（シナリオ固定）
  // demand: 1日需要 / local: 現地供給/日 / stock: 初期在庫 / cap: 倉庫容量 / cost: 1単位あたり補給ポイント
  // affects: この物資の充足率が影響するステータス
  var RES_DEFS = [
    { key: 'food', name: '食料', demand: 100, local: 58, stock: 150, cap: 400, cost: 1.0, affects: ['morale', 'health'] },
    { key: 'fuel', name: '燃料', demand: 60, local: 36, stock: 105, cap: 300, cost: 1.3, affects: ['logistics'] },
    { key: 'med', name: '医療', demand: 30, local: 18, stock: 62, cap: 150, cost: 1.8, affects: ['health'] },
    { key: 'mat', name: '資材', demand: 45, local: 25, stock: 95, cap: 250, cost: 1.2, affects: ['logistics', 'health'] },
    { key: 'ammo', name: '弾薬', demand: 70, local: 42, stock: 135, cap: 300, cost: 1.4, affects: ['defense'] }
  ];
  var RES_BY_KEY = {};
  RES_DEFS.forEach(function (r) { RES_BY_KEY[r.key] = r; });
  var RES_KEYS = RES_DEFS.map(function (r) { return r.key; });

  var METHODS = {
    normal: { label: '通常補給', lead: 3, pointMult: 1.0, desc: '到着3日・低コスト' },
    express: { label: '速達補給', lead: 1, pointMult: 2.0, desc: '到着1日・高コスト' },
    risky: { label: '危険輸送', lead: 2, pointMult: 1.25, desc: '到着2日・遅延/損耗リスク' }
  };
  var METHOD_KEYS = ['normal', 'express', 'risky'];

  var STATUS_DEFS = [
    { key: 'health', name: '健全度' },
    { key: 'morale', name: '士気' },
    { key: 'logistics', name: '輸送力' },
    { key: 'defense', name: '防衛力' }
  ];

  var BASE_TRANSPORT = 140; // logistics 100% のときの1日輸送枠
  var BASE_INCOME = 78;     // logistics 0% でも入る基礎補給ポイント
  var LOG_INCOME = 60;      // logistics 100% で加算される補給ポイント

  var S = null;
  var els = {};
  var activeTab = 'status';
  var busy = false;
  var toastTimer = null;

  function isObj(v) { return v !== null && typeof v === 'object' && !Array.isArray(v); }
  function clampN(v, a, b) { return Math.min(b, Math.max(a, v)); }
  function toNum(v, f) { var n = Number(v); return Number.isFinite(n) ? n : f; }
  function toInt(v, f) { var n = Number(v); return Number.isFinite(n) ? Math.floor(n) : f; }
  function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text !== undefined && text !== null) e.textContent = text; return e; }
  function genId() { if (window.crypto && typeof window.crypto.randomUUID === 'function') return window.crypto.randomUUID(); return 'o-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8); }
  function r0(n) { return Math.round(n); }

  function showBanner(msg) { els.banner.textContent = msg; els.banner.hidden = false; }
  function hideBanner() { els.banner.hidden = true; }
  function showToast(msg) { els.toast.textContent = msg; els.toast.hidden = false; if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(function () { els.toast.hidden = true; }, 2800); }

  // ---------- state ----------

  function freshState() {
    var st = { day: 1, points: 340, transport: BASE_TRANSPORT, over: false, result: null,
      status: { health: 80, morale: 76, logistics: 74, defense: 76 },
      res: {}, orders: [], history: [],
      stats: { ordered: 0, spent: 0, events: 0, shortfallDays: 0 } };
    RES_DEFS.forEach(function (r) {
      st.res[r.key] = { stock: r.stock, ful: 1, supplied: r.demand, demand: r.demand };
    });
    return st;
  }

  function sanitizeState(p) {
    var f = freshState();
    if (!isObj(p)) return f;
    f.day = clampN(toInt(p.day, 1), 1, GAME_DAYS + 1);
    f.points = clampN(toNum(p.points, 340), 0, 999999);
    f.transport = clampN(toNum(p.transport, BASE_TRANSPORT), 0, 999999);
    f.over = p.over === true;
    f.result = (p.result === 'win' || p.result === 'lose' || p.result === 'perfect') ? p.result : null;
    if (isObj(p.status)) {
      STATUS_DEFS.forEach(function (s) { f.status[s.key] = clampN(toNum(p.status[s.key], 70), 0, 100); });
    }
    if (isObj(p.res)) {
      RES_DEFS.forEach(function (r) {
        var raw = p.res[r.key];
        if (isObj(raw)) {
          f.res[r.key] = {
            stock: clampN(toNum(raw.stock, r.stock), 0, r.cap),
            ful: clampN(toNum(raw.ful, 1), 0, 3),
            supplied: clampN(toNum(raw.supplied, r.demand), 0, 999999),
            demand: r.demand
          };
        }
      });
    }
    if (Array.isArray(p.orders)) {
      p.orders.forEach(function (raw) {
        if (!isObj(raw)) return;
        if (RES_KEYS.indexOf(raw.resKey) === -1) return;
        if (METHOD_KEYS.indexOf(raw.method) === -1) return;
        f.orders.push({
          id: typeof raw.id === 'string' && raw.id ? raw.id.slice(0, 40) : genId(),
          resKey: raw.resKey, method: raw.method,
          qty: clampN(toInt(raw.qty, 0), 0, 999999),
          effQty: clampN(toInt(raw.effQty, toInt(raw.qty, 0)), 0, 999999),
          etaDay: clampN(toInt(raw.etaDay, f.day + 1), 1, GAME_DAYS + 30),
          applied: raw.applied === true,
          note: typeof raw.note === 'string' ? raw.note.slice(0, 60) : ''
        });
      });
    }
    if (Array.isArray(p.history)) {
      p.history.forEach(function (raw) {
        if (isObj(raw) && typeof raw.text === 'string' && f.history.length < HISTORY_MAX) {
          f.history.push({ day: clampN(toInt(raw.day, 1), 1, GAME_DAYS + 1), type: typeof raw.type === 'string' ? raw.type.slice(0, 12) : 'info', text: raw.text.slice(0, 160) });
        }
      });
    }
    if (isObj(p.stats)) {
      f.stats.ordered = clampN(toInt(p.stats.ordered, 0), 0, 999999);
      f.stats.spent = clampN(toInt(p.stats.spent, 0), 0, 99999999);
      f.stats.events = clampN(toInt(p.stats.events, 0), 0, 999999);
      f.stats.shortfallDays = clampN(toInt(p.stats.shortfallDays, 0), 0, 999999);
    }
    return f;
  }

  function loadState() {
    var raw;
    try { raw = window.localStorage.getItem(KEY); }
    catch (e) { showBanner('この端末では保存機能を利用できません。進行は保存されません。'); S = freshState(); return; }
    if (!raw) {
      // v1 の在庫管理データがある場合は、ゲーム刷新を案内して新規シナリオで開始
      var hadOld = false;
      try { hadOld = !!window.localStorage.getItem(OLD_KEY); } catch (e) { hadOld = false; }
      if (hadOld) {
        try { window.localStorage.removeItem(OLD_KEY); } catch (e) { /* 続行 */ }
        showBanner('v1.1でゲーム内容が「補給バランスゲーム」に刷新されました。以前の在庫データは引き継げないため、新しいシナリオで開始します。');
      }
      S = freshState(); return;
    }
    try {
      var p = JSON.parse(raw);
      if (!isObj(p)) throw new Error('shape');
      S = sanitizeState(p);
    } catch (e) {
      showBanner('保存データを読み込めなかったため、新しいシナリオから始めます。');
      S = freshState();
    }
  }

  function persist() {
    try { window.localStorage.setItem(KEY, JSON.stringify(S)); }
    catch (e) { showBanner('保存できませんでした。この画面を閉じると進行は失われますが、操作は継続できます。'); }
  }

  // ---------- game logic ----------

  function pushHistory(type, text) {
    S.history.unshift({ day: S.day, type: type, text: text });
    if (S.history.length > HISTORY_MAX) S.history.length = HISTORY_MAX;
  }

  function stateLevel(v) { return v >= 60 ? 'good' : v >= 40 ? 'warn' : v >= 20 ? 'danger' : 'crit'; }

  function fulState(ful) {
    var p = ful * 100;
    if (p >= 110) return '余裕';
    if (p >= 100) return '安定';
    if (p >= 80) return '注意';
    if (p >= 50) return '危険';
    if (p >= 1) return '崩壊寸前';
    return '供給停止';
  }

  function transportCapacity() { return r0(BASE_TRANSPORT * (0.35 + 0.65 * S.status.logistics / 100)); }
  function dailyIncome() { return r0(BASE_INCOME + LOG_INCOME * S.status.logistics / 100); }

  // 発注: 成否と理由を返す
  function placeOrder(resKey, qty, method) {
    if (S.result) return { ok: false, msg: 'ゲームは終了しています。' };
    var r = RES_BY_KEY[resKey];
    var m = METHODS[method];
    if (!r || !m) return { ok: false, msg: '対象または補給方式が不正です。' };
    if (!Number.isFinite(qty) || qty <= 0) return { ok: false, msg: '数量は1以上で入力してください。' };
    qty = Math.floor(qty);
    var cost = r0(qty * r.cost * m.pointMult);
    if (cost > S.points) return { ok: false, msg: '補給ポイントが不足しています（必要 ' + cost + ' / 残 ' + r0(S.points) + '）。' };
    if (qty > S.transport) return { ok: false, msg: '本日の輸送枠が不足しています（必要 ' + qty + ' / 残 ' + r0(S.transport) + '）。翌日に持ち越すか数量を減らしてください。' };
    S.points -= cost;
    S.transport -= qty;
    S.stats.ordered++;
    S.stats.spent += cost;
    var eta = S.day + m.lead;
    var effQty = qty;
    var note = '';
    if (method === 'risky') {
      if (Math.random() < 0.28) { var dd = 1 + Math.floor(Math.random() * 2); eta += dd; note = '遅延' + dd + '日'; }
      if (Math.random() < 0.22) { var lost = Math.round(qty * (0.2 + Math.random() * 0.25)); effQty = Math.max(0, qty - lost); note = (note ? note + '・' : '') + '損耗' + lost; }
    }
    S.orders.push({ id: genId(), resKey: resKey, method: method, qty: qty, effQty: effQty, etaDay: eta, applied: false, note: note });
    pushHistory('order', '発注: ' + r.name + ' ' + qty + '（' + m.label + '・' + cost + 'pt・' + eta + '日目着' + (note ? '／' + note : '') + '）');
    persist();
    return { ok: true, msg: r.name + ' を ' + qty + ' 発注しました（' + eta + '日目着）' };
  }

  var EVENTS = [
    function () { // 敵襲: 弾薬消費・防衛力で被害軽減
      var dmg = r0((14 - S.status.defense * 0.1)); dmg = clampN(dmg, 3, 16);
      S.status.defense = clampN(S.status.defense - dmg, 0, 100);
      var a = S.res.ammo; a.stock = Math.max(0, a.stock - r0(20 * (1.4 - S.status.defense / 100)));
      return '敵襲。防衛力 -' + dmg + '、弾薬を消耗した。';
    },
    function () { // 悪路: 輸送力低下
      var dmg = clampN(r0(6 + Math.random() * 6), 3, 14);
      S.status.logistics = clampN(S.status.logistics - dmg, 0, 100);
      return '悪路・車両故障。輸送力 -' + dmg + '。';
    },
    function () { // 疫病: 医療在庫と健全度、医療充足で軽減
      var medFul = S.res.med.ful;
      var dmg = clampN(r0(12 * (1.3 - medFul)), 2, 16);
      S.status.health = clampN(S.status.health - dmg, 0, 100);
      S.res.med.stock = Math.max(0, S.res.med.stock - 12);
      return '疫病発生。健全度 -' + dmg + '（医療備蓄で被害軽減）。';
    },
    function () { // 補給ポイント臨時支給
      var g = r0(40 + Math.random() * 40); S.points += g;
      return '後方から臨時補給ポイント +' + g + '。';
    },
    function () { // 需要増: ランダム物資の在庫が一時的に減る
      var r = RES_DEFS[Math.floor(Math.random() * RES_DEFS.length)];
      var loss = r0(r.demand * (0.3 + Math.random() * 0.3));
      S.res[r.key].stock = Math.max(0, S.res[r.key].stock - loss);
      return '需要急増（' + r.name + '）。在庫 -' + loss + '。';
    }
  ];

  // ステータス更新: 影響物資の充足率に応じて 0-100 を増減
  function updateStatus() {
    function avgFul(keys) {
      var s = 0; keys.forEach(function (k) { s += Math.min(1.15, S.res[k].ful); }); return s / keys.length;
    }
    var inputs = {
      morale: avgFul(['food']),
      logistics: avgFul(['fuel', 'mat']),
      defense: avgFul(['ammo']),
      health: (Math.min(1.15, S.res.food.ful) * 0.4 + Math.min(1.15, S.res.med.ful) * 0.4 + Math.min(1.15, S.res.mat.ful) * 0.2)
    };
    STATUS_DEFS.forEach(function (s) {
      var f = inputs[s.key];
      // 充足0.85を分岐点に、下回れば低下・上回れば回復。低い充足ほど急落。
      var delta = (f - 0.85) * 30;
      S.status[s.key] = clampN(S.status[s.key] + delta, 0, 100);
    });
  }

  function advanceDay() {
    if (busy || S.result) return;
    busy = true;
    hideBanner();
    S.day++;

    // 1) 到着処理
    var arrivals = [];
    S.orders.forEach(function (o) {
      if (!o.applied && o.etaDay === S.day) {
        var r = RES_BY_KEY[o.resKey];
        var before = S.res[o.resKey].stock;
        S.res[o.resKey].stock = Math.min(r.cap, before + o.effQty);
        var stored = S.res[o.resKey].stock - before;
        o.applied = true;
        var over = o.effQty - stored;
        arrivals.push(r.name + ' +' + stored + (over > 0 ? '（倉庫超過で' + over + '廃棄）' : '') + (o.note ? '［' + o.note + '］' : ''));
      }
    });
    if (arrivals.length) pushHistory('good', '補給到着: ' + arrivals.join(' / '));
    // 期限切れ（未着で過ぎた）注文の掃除は起きない設計（etaは必ず未来）。適用済みは保持数を抑える
    if (S.orders.length > 60) S.orders = S.orders.filter(function (o) { return !o.applied; }).concat(S.orders.filter(function (o) { return o.applied; }).slice(-20));

    // 2) 現地供給 + 需要消費 + 充足率
    var shortfalls = [];
    RES_DEFS.forEach(function (r) {
      var st = S.res[r.key];
      st.stock = Math.min(r.cap, st.stock + r.local);
      var supplied = Math.min(st.stock, r.demand);
      st.stock -= supplied;
      st.supplied = supplied;
      st.ful = supplied / r.demand;
      if (st.ful < 0.8) shortfalls.push(r.name + Math.round(st.ful * 100) + '%');
    });
    if (shortfalls.length) { S.stats.shortfallDays++; }

    // 3) ステータス更新
    updateStatus();

    // 4) ランダムイベント
    if (Math.random() < 0.55) {
      var ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
      var msg = ev();
      S.stats.events++;
      pushHistory('event', '突発｜' + msg);
    }

    // 5) 補給ポイント収入・輸送枠リセット
    var inc = dailyIncome();
    S.points += inc;
    S.transport = transportCapacity();

    // 日次サマリー
    pushHistory('day', S.day + '日目。' + (shortfalls.length ? '供給不足: ' + shortfalls.join('、') + '。' : '主要物資は概ね充足。') + ' 補給pt+' + inc + '。');

    // 6) 終了判定
    checkEnd();

    persist();
    busy = false;
    render();
    if (!S.result) showToast(S.day + '日目へ進みました（補給pt +' + inc + ' / 輸送枠 ' + r0(S.transport) + '）');
  }

  function checkEnd() {
    if (S.status.health <= 0) {
      S.result = 'lose';
      pushHistory('bad', '健全度が0に達し、補給線が崩壊した。');
      return;
    }
    if (S.day > GAME_DAYS) {
      var h = S.status.health;
      if (h >= 80) { S.result = 'perfect'; pushHistory('good', GAME_DAYS + '日間の補給線維持に成功（優秀）。'); }
      else if (h >= 50) { S.result = 'win'; pushHistory('good', GAME_DAYS + '日間の補給線維持に成功。'); }
      else if (h >= 30) { S.result = 'win'; pushHistory('day', GAME_DAYS + '日間を辛くも持ちこたえた（辛勝）。'); }
      else { S.result = 'lose'; pushHistory('bad', GAME_DAYS + '日終了時点で健全度が低く、補給線は崩壊寸前だった。'); }
    }
  }

  // ---------- forecast ----------

  // 到着予定を織り込んで、各物資が何日後に危険域(充足<80%相当=在庫が需要-現地を割る)に入るか等を予測
  function forecastRes(r) {
    var st = S.res[r.key];
    var stock = st.stock;
    var net = r.demand - r.local; // 1日の正味減少（発注が無い場合）
    var incoming = S.orders.filter(function (o) { return !o.applied && o.resKey === r.key; })
      .sort(function (a, b) { return a.etaDay - b.etaDay; });
    var dangerDay = null, stockoutDay = null;
    var sim = stock;
    for (var d = 1; d <= 14; d++) {
      var day = S.day + d;
      incoming.forEach(function (o) { if (o.etaDay === day) sim = Math.min(r.cap, sim + o.effQty); });
      sim = Math.min(r.cap, sim + r.local);
      var supplied = Math.min(sim, r.demand);
      sim -= supplied;
      var ful = supplied / r.demand;
      if (ful < 0.8 && dangerDay === null) dangerDay = d;
      if (supplied <= 0 && stockoutDay === null) stockoutDay = d;
    }
    // 今注文しないと間に合わないか: 現在庫だけで最短リードタイム(通常3日)先まで危険にならないか
    var coverDays = net > 0 ? Math.floor(stock / net) : 99;
    var mustOrder = (dangerDay !== null && dangerDay <= 3 && incoming.length === 0);
    return { dangerDay: dangerDay, stockoutDay: stockoutDay, coverDays: coverDays, incoming: incoming.length, mustOrder: mustOrder };
  }

    dataCard.appendChild(el('h2', null, 'データ'));
    dataCard.appendChild(el('div', 'note', '進行はこの端末のブラウザ内（localStorage）にのみ保存されます。'));
    var reset = el('button', 'danger-btn', '最初からやり直す（リセット）'); reset.type = 'button'; reset.dataset.action = 'reset-game'; reset.style.marginTop = '10px';
    dataCard.appendChild(reset);
    root.appendChild(dataCard);
  }

  function render() {
    renderTopBar();
    var tabs = els.tabBar.querySelectorAll('.tab-btn');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle('active', tabs[i].dataset.tab === activeTab);
    var root = els.tabContent; root.innerHTML = '';
    if (activeTab === 'status') renderStatus(root);
    else if (activeTab === 'supply') renderSupply(root);
    else if (activeTab === 'history') renderHistory(root);
    else if (activeTab === 'info') renderInfo(root);
  }

  function onAction(e) {
    var t = e.target.closest('[data-action]');
    if (!t) return;
    switch (t.dataset.action) {
      case 'next-day': advanceDay(); break;
      case 'place-order': submitOrder(); break;
      case 'reset-game': resetGame(); break;
    }
  }

  function init() {
    els.banner = document.getElementById('banner');
    els.toast = document.getElementById('toast');
    els.topBar = document.getElementById('topBar');
    els.tabBar = document.getElementById('tabBar');
    els.tabContent = document.getElementById('tabContent');
    els.tabBar.addEventListener('click', function (e) {
      var b = e.target.closest('.tab-btn'); if (!b) return;
      activeTab = b.dataset.tab; hideBanner(); render(); window.scrollTo({ top: 0 });
    });
    els.tabContent.addEventListener('click', onAction);
    loadState();
    persist();
    render();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
